<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BhavyaCare - Lab Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; background-color: #ffffff; padding: 15px 40px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05); }
        .logo h2 { color: #0056b3; font-size: 24px; font-weight: 800; margin: 0; }
        .logo span { color: #28a745; }
        
        .logout-btn { background-color: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .logout-btn:hover { background-color: #c82333; }

        /* Dashboard Container */
        .dashboard-container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        
        /* Welcome Card */
        .welcome-card { background: white; padding: 20px 30px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;}
        .welcome-text h3 { margin: 0; color: #333; font-size: 22px; }
        .welcome-text p { margin: 5px 0 0 0; color: #666; }
        .lab-badge { background-color: #e6f0fa; color: #0056b3; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; border: 1px solid #cce5ff; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
        .stat-card h4 { margin: 0; color: #888; font-size: 16px; }
        .stat-card h2 { margin: 10px 0 0 0; color: #0056b3; font-size: 28px; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo"><h2>Bhavya<span>Care</span> <small style="color:#666; font-size:14px;">| Lab Portal</small></h2></div>
        <button class="logout-btn" onclick="labLogout()">🚪 Logout</button>
    </header>

    <div class="dashboard-container">
        <div class="welcome-card">
            <div class="welcome-text">
                <h3>Welcome, <span id="displayLabName">Loading...</span></h3>
                <p>Manage your lab test orders and reports from here.</p>
            </div>
            <div class="lab-badge" id="displayLabId">ID: Loading...</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h4>New Orders</h4>
                <h2>0</h2>
            </div>
            <div class="stat-card">
                <h4>Pending Reports</h4>
                <h2>0</h2>
            </div>
            <div class="stat-card">
                <h4>Total Revenue</h4>
                <h2>₹0</h2>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="Lab.js"></script>
</body>
</html>
