<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Registration - BhavyaCare</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7fb; padding: 20px; }
        .form-container { background: white; max-width: 900px; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #059669; border-bottom: 2px solid #ecfdf5; padding-bottom: 10px; margin-top: 30px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 14px; }
        input[type="text"], input[type="email"], input[type="time"], input[type="file"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;}
        .service-checkboxes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; font-size: 14px; }
        button.submit-btn { width: 100%; padding: 15px; background: #059669; color: white; border: none; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 30px; }
        button.submit-btn:disabled { background: #9ca3af; }
    </style>
</head>
<body>

<div class="form-container">
    <h1 style="text-align: center; color: #0f172a;">Complete Your Lab Profile</h1>
    <p style="text-align: center; color: #64748b;">Please fill all mandatory details to activate your lab on BhavyaCare.</p>

    <form id="labRegForm">
        <h2>1. Basic Details</h2>
        <div class="grid-2">
            <div class="form-group"><label>Lab Name *</label><input type="text" id="lab_name" readonly></div>
            <div class="form-group"><label>Email Address *</label><input type="email" id="lab_email" required></div>
            <div class="form-group"><label>Lab Registration Document (PDF) *</label><input type="file" id="reg_doc" accept=".pdf" required></div>
        </div>
        <div class="form-group"><label>Full Address *</label><input type="text" id="lab_address" required></div>
        <div class="grid-3">
            <div class="form-group"><label>City *</label><input type="text" id="city" required></div>
            <div class="form-group"><label>Pincode *</label><input type="text" id="pincode" required></div>
        </div>

        <h2>2. Service Areas</h2>
        <div class="form-group">
            <label>Available Pincodes (Comma separated, e.g., 124507, 124508) *</label>
            <input type="text" id="available_pincode" required>
        </div>
        <div class="form-group">
            <label>Available Cities (Comma separated, e.g., Bahadurgarh, Jhajjar) *</label>
            <input type="text" id="available_city" required>
        </div>

        <h2>3. Accreditations</h2>
        <div class="grid-2">
            <div class="form-group">
                <label>NABL Approved? *</label>
                <select id="nabl" onchange="toggleCert('nabl')" required><option value="No">No</option><option value="Yes">Yes</option></select>
                <input type="file" id="nabl_cert" accept=".pdf" style="display:none; margin-top:5px;">
            </div>
            <div class="form-group">
                <label>NABH Approved? *</label>
                <select id="nabh" onchange="toggleCert('nabh')" required><option value="No">No</option><option value="Yes">Yes</option></select>
                <input type="file" id="nabh_cert" accept=".pdf" style="display:none; margin-top:5px;">
            </div>
        </div>

        <h2>4. Services Offered (Check if available)</h2>
        <div class="service-checkboxes" id="servicesContainer">
            </div>

        <h2>5. Working Timings</h2>
        <div id="timingsContainer">
            </div>

        <h2>6. Lab Images</h2>
        <div class="grid-3">
            <div class="form-group"><label>Lab Image 1 (Required) *</label><input type="file" id="lab_img1" accept="image/*" required></div>
            <div class="form-group"><label>Lab Image 2</label><input type="file" id="lab_img2" accept="image/*"></div>
            <div class="form-group"><label>Lab Image 3</label><input type="file" id="lab_img3" accept="image/*"></div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Submit Profile for Verification</button>
    </form>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="lab_registration.js"></script>
</body>
</html>
