<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Registration - BhavyaCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* === MOBILE FRIENDLY & MODERN CSS === */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f4f7fb; 
            padding: 20px 15px; /* Mobile ke liye padding adjust ki hai */
            color: #0f172a; 
            margin: 0;
            min-height: 100vh;
        }
        
        .container { 
            background: white; 
            max-width: 800px; 
            margin: auto; 
            padding: 30px 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
        }

        /* --- STATUS SCREEN STYLING --- */
        .status-screen {
            text-align: center;
            padding: 40px 20px;
            display: none; /* Default hidden */
        }
        .status-screen i { font-size: 60px; margin-bottom: 20px; }
        .status-screen h2 { color: #0f172a; margin-bottom: 10px; font-size: 24px; }
        .status-screen p { color: #64748b; font-size: 16px; line-height: 1.5; }
        
        .alert-box {
            background: #fef2f2; border: 1px solid #f87171; color: #b91c1c;
            padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none;
            text-align: left;
        }

        /* --- FORM STYLING --- */
        h1 { text-align: center; font-size: 24px; margin-top: 0;}
        h3 { border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; color: #059669; font-size: 18px; margin-top: 30px;}
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; width: 100%; }
        
        label { font-weight: 600; display: block; margin-bottom: 6px; font-size: 13px; color: #475569;}
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; 
            font-family: 'Inter', sans-serif; font-size: 15px; background: #f8fafc;
        }
        input:focus, select:focus, textarea:focus { border-color: #059669; outline: none; background: white;}
        input[readonly] { background: #e2e8f0; cursor: not-allowed; }

        .submit-btn { 
            width: 100%; padding: 16px; background: #059669; color: white; border: none; 
            font-size: 18px; font-weight: 700; border-radius: 8px; cursor: pointer; 
            margin-top: 30px; transition: 0.3s;
        }
        .submit-btn:hover { background: #047857; }
        .submit-btn:disabled { background: #94a3b8; cursor: not-allowed; }

        /* === MOBILE RESPONSIVENESS (Jadu Yahan Hai) === */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 20px 15px; }
            .grid-2 { grid-template-columns: 1fr; gap: 10px; } /* Mobile par ek ke niche ek aayega */
            h1 { font-size: 20px; }
            input, select, textarea { padding: 14px; font-size: 16px; } /* Mobile par tap karna aasan ho */
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="statusScreen" class="status-screen">
        <i id="statusIcon" class="fas fa-clock" style="color: #f59e0b;"></i>
        <h2 id="statusTitle">Checking Account...</h2>
        <p id="statusMessage">Please wait while we verify your details.</p>
        <button id="logoutBtn" onclick="logout()" class="submit-btn" style="background:#ef4444; margin-top:20px; display:none;">Logout</button>
    </div>

    <div id="registrationFormContainer" style="display: none;">
        <h1>Doctor Registration</h1>
        
        <div id="rejectAlert" class="alert-box">
            <strong><i class="fas fa-exclamation-circle"></i> Application Rejected:</strong> 
            <span id="rejectReasonText"></span><br>
            <span style="font-size: 13px; color:#475569;">Please update the required details and resubmit.</span>
        </div>

        <form id="docRegForm">
            <h3>Basic Details</h3>
            <div class="grid-2">
                <div class="form-group"><label>Doctor ID</label><input type="text" id="doctor_id" readonly></div>
                <div class="form-group"><label>Full Name</label><input type="text" id="doctor_name" readonly></div>
                <div class="form-group"><label>Email Address *</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Speciality *</label><input type="text" id="speciality" required placeholder="e.g. Cardiologist"></div>
            </div>

            <h3>Clinic Details</h3>
            <div class="form-group"><label>Clinic Name *</label><input type="text" id="clinic_name" required></div>
            <div class="form-group"><label>Clinic Full Address *</label><textarea id="clinic_address" rows="3" required></textarea></div>
            <div class="grid-2">
                <div class="form-group"><label>City *</label><input type="text" id="city" required></div>
                <div class="form-group"><label>Pincode *</label><input type="number" id="pincode" required></div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Submit Profile for Verification</button>
        </form>
    </div>

</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_leCWfb7HNhh4BLGLMqhM8dF9jCKpvmqIZkijnzEJl__E3dZftwl3z-hZ7mmzYtrHSA/exec";

    document.addEventListener("DOMContentLoaded", () => {
        // User data LocalStorage se get karein
        const docId = localStorage.getItem("bhavya_user_id");
        const docName = localStorage.getItem("bhavya_name");
        
        // Agar id "DOC-" se start nahi hoti toh wapas bhej do
        if (!docId || !docId.startsWith("DOC-")) {
            alert("Unauthorized! Please login as Doctor.");
            window.location.href = "../index.html";
            return;
        }

        // Form me pre-fill kar do
        document.getElementById("doctor_id").value = docId;
        document.getElementById("doctor_name").value = docName;

        // Load hote hi check karo Doctor ka status kya hai
        checkDoctorStatus(docId);

        // Form Submit Event
        document.getElementById("docRegForm").addEventListener("submit", handleFormSubmit);
    });

    // ==========================================
    // 1. STATUS CHECKING LOGIC
    // ==========================================
    function checkDoctorStatus(docId) {
        // Shuru me status screen dikhao with loader
        document.getElementById("registrationFormContainer").style.display = "none";
        document.getElementById("statusScreen").style.display = "block";
        
        // Ideally, yahan ek API call karni chahiye backend se status confirm karne ke liye.
        // Lekin kyunki 'doctor.gs' me login ke time hum status LocalStorage me save karte hain, hum wahi use kar sakte hain.
        let status = localStorage.getItem("doc_status") || "not_registered";
        let reason = localStorage.getItem("reject_reason") || "";

        showScreenBasedOnStatus(status, reason);
    }

    function showScreenBasedOnStatus(status, reason) {
        const formContainer = document.getElementById("registrationFormContainer");
        const statusScreen = document.getElementById("statusScreen");
        const statusIcon = document.getElementById("statusIcon");
        const statusTitle = document.getElementById("statusTitle");
        const statusMessage = document.getElementById("statusMessage");
        const logoutBtn = document.getElementById("logoutBtn");

        if (status === "not_registered") {
            // Naya doctor - Form dikhao
            statusScreen.style.display = "none";
            formContainer.style.display = "block";
        } 
        else if (status === "Pending") {
            // Wait karne ko bolo (WARNING SCREEN)
            formContainer.style.display = "none";
            statusScreen.style.display = "block";
            statusIcon.className = "fas fa-clock";
            statusIcon.style.color = "#f59e0b";
            statusTitle.innerText = "Application Under Review";
            statusMessage.innerText = "Aapka registration form submit ho chuka hai aur admin review ke liye pending hai. Approval milne par aap login kar payenge.";
            logoutBtn.style.display = "block";
        } 
        else if (status === "Rejected") {
            // Form wapas dikhao, aur upar error message dikhao
            statusScreen.style.display = "none";
            formContainer.style.display = "block";
            document.getElementById("rejectAlert").style.display = "block";
            document.getElementById("rejectReasonText").innerText = reason;
        }
        else if (status === "Active") {
            // Agar active hai toh sidha dashboard bhej do
            window.location.href = "doctor_dashboard.html";
        }
    }

    // ==========================================
    // 2. FORM SUBMIT LOGIC
    // ==========================================
    async function handleFormSubmit(e) {
        e.preventDefault();
        
        const btn = document.getElementById("submitBtn");
        btn.innerText = "Submitting... Please wait";
        btn.disabled = true;

        // Data ikattha karo (Aapke baaki fields bhi yahan add honge)
        let payload = {
            action: "submitDoctorRegistration",
            data: {
                doctor_id: document.getElementById("doctor_id").value,
                doctor_name: document.getElementById("doctor_name").value,
                email: document.getElementById("email").value,
                speciality: document.getElementById("speciality").value,
                clinic_name: document.getElementById("clinic_name").value,
                clinic_address: document.getElementById("clinic_address").value,
                city: document.getElementById("city").value,
                pincode: document.getElementById("pincode").value
                // doc_base64, img_base64 etc. bhi yahan jayenge
            }
        };

        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
            });
            const resData = await response.json();

            if (resData.status === "success") {
                // JADU YAHAN HAI: Submit hote hi LocalStorage me status update kar do aur screen change kar do
                localStorage.setItem("doc_status", "Pending");
                showScreenBasedOnStatus("Pending", "");
            } else {
                alert("Server Error: " + resData.message);
                btn.innerText = "Submit Profile for Verification";
                btn.disabled = false;
            }
        } catch (error) {
            alert("A network error occurred. Please try again.");
            btn.innerText = "Submit Profile for Verification";
            btn.disabled = false;
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = "../index.html";
    }
</script>

</body>
</html>
