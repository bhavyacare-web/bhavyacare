<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BhavyaCare - Lab Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f4f7fb; color: #0f172a; margin: 0; padding: 20px;}
        
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px;}
        .header h1 { margin: 0; font-size: 24px; color: #1e293b; display: flex; align-items: center; gap: 10px;}
        .header i { color: #3b82f6; }

        .table-container { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto;}
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: #64748b; font-weight: 600; font-size: 14px; text-transform: uppercase;}
        td { font-size: 15px; }
        tr:hover { background: #f1f5f9; }
        
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase;}
        .status-active { background: #dcfce7; color: #166534; }
        .status-inactive { background: #fef3c7; color: #92400e; }
        .status-cancel { background: #fee2e2; color: #991b1b; }

        .btn-edit { background: #3b82f6; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.2s;}
        .btn-edit:hover { background: #2563eb; }

        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;}
        .modal { background: white; width: 95%; max-width: 900px; max-height: 90vh; overflow-y: auto; border-radius: 16px; padding: 30px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); position: relative;}
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 24px; cursor: pointer; color: #64748b;}
        .close-modal:hover { color: #ef4444; }
        
        .modal h2 { margin-top: 0; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; color: #1e293b;}
        .section-title { font-size: 16px; font-weight: 700; color: #334155; margin-bottom: 15px; margin-top: 25px; border-left: 4px solid #3b82f6; padding-left: 10px;}
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #f8fafc; padding: 20px; border-radius: 10px; border: 1px solid #e2e8f0;}
        .info-item label { display: block; font-size: 12px; color: #64748b; font-weight: 600; margin-bottom: 5px; text-transform: uppercase;}
        .info-item p { margin: 0; font-weight: 600; font-size: 15px; color: #0f172a;}

        /* Docs & Images Links */
        .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px;}
        .doc-link { display: inline-flex; align-items: center; gap: 8px; background: #eff6ff; color: #1d4ed8; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; border: 1px solid #bfdbfe; transition: 0.2s;}
        .doc-link:hover { background: #dbeafe; transform: translateY(-2px);}
        .doc-none { color: #94a3b8; font-size: 14px; font-style: italic; padding: 10px;}

        /* Timings Grid */
        .timings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px;}
        .time-card { background: white; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; text-align: center;}
        .time-card.closed { background: #fef2f2; color: #ef4444;}
        .time-day { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #64748b; margin-bottom: 5px;}
        .time-val { font-size: 14px; font-weight: 600;}

        /* Services Checkbox Grid */
        .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px;}
        .services-grid label { background: white; border: 1px solid #cbd5e1; padding: 10px 15px; border-radius: 8px; display: flex; align-items: center; cursor: pointer; font-size: 14px; font-weight: 500; transition: 0.2s;}
        .services-grid label:hover { border-color: #3b82f6; background: #eff6ff;}
        .services-grid input { width: 18px; height: 18px; margin-right: 10px; accent-color: #3b82f6; cursor: pointer;}
        
        .status-select { width: 100%; padding: 14px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 16px; font-weight: 600; font-family: 'Inter'; outline: none; margin-bottom: 30px;}
        .status-select:focus { border-color: #3b82f6; }

        .btn-save { width: 100%; background: #10b981; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; position: sticky; bottom: -10px;}
        .btn-save:hover { background: #059669; }
        .btn-save:disabled { background: #94a3b8; cursor: not-allowed; }

        #loadingMsg { text-align: center; padding: 40px; font-size: 18px; color: #64748b; font-weight: 600;}
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-microscope"></i> Manage Labs</h1>
        <div style="font-weight: 600; color: #475569;">Admin Dashboard</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Lab Name</th>
                    <th>Email</th>
                    <th>City / Pincode</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="labsTableBody"></tbody>
        </table>
        <div id="loadingMsg"><i class="fas fa-spinner fa-spin"></i> Fetching registered labs...</div>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalLabName">Lab Name</h2>
            
            <div class="info-grid">
                <div class="info-item"><label>User ID</label><p id="modalUid">-</p></div>
                <div class="info-item"><label>Email</label><p id="modalEmail">-</p></div>
                <div class="info-item"><label>Full Address</label><p id="modalAddress">-</p></div>
                <div class="info-item"><label>City / Pincode</label><p id="modalCityPin">-</p></div>
            </div>

            <div class="section-title">Documents & Certifications</div>
            <div class="doc-grid" id="modalDocs">
                </div>

            <div class="section-title">Lab Images</div>
            <div class="doc-grid" id="modalImages">
                </div>

            <div class="section-title">Working Timings</div>
            <div class="timings-grid" id="modalTimings">
                </div>

            <div class="section-title">Manage Services Offered</div>
            <div class="services-grid" id="modalServicesGrid">
                </div>

            <div class="section-title" style="margin-top: 35px;">Account Status Verification</div>
            <select id="modalStatusSelect" class="status-select">
                <option value="Active">Active (Approve Lab)</option>
                <option value="Inactive">Inactive (Under Review)</option>
                <option value="Cancel">Cancel (Reject Lab)</option>
            </select>

            <button class="btn-save" id="saveBtn" onclick="saveLabDetails()">Update & Notify Lab</button>
        </div>
    </div>

<script>
    // NOTE: APNA MAIN DEPLOYMENT URL YAHAN DAALEIN
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_leCWfb7HNhh4BLGLMqhM8dF9jCKpvmqIZkijnzEJl__E3dZftwl3z-hZ7mmzYtrHSA/exec";
    
    const servicesList = [
        "pathology", "profile", "discount_profile", "usg", "xray", "ct", "mri", 
        "ecg", "echo", "tmt", "eeg", "pft", "holter", "abp", "ncv_emg", "ssep", 
        "evoked_potentiat", "sleep_study", "mammography", "dlco", "endoscopy", "colonoscopy"
    ];
    const daysArr = ["monday", "tuesday", "wednesday", "thursday", "friday", "saturday", "sunday"];

    let allLabsData = [];
    let currentEditUid = null;

    document.addEventListener("DOMContentLoaded", fetchLabs);

    function fetchLabs() {
        document.getElementById("loadingMsg").style.display = "block";
        document.getElementById("labsTableBody").innerHTML = "";

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "getAdminLabs" })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById("loadingMsg").style.display = "none";
            if(data.status === "success") {
                allLabsData = data.data;
                renderTable();
            } else {
                alert("Error fetching labs: " + data.message);
            }
        })
        .catch(err => {
            document.getElementById("loadingMsg").innerText = "Network Error!";
            console.error(err);
        });
    }

    function renderTable() {
        const tbody = document.getElementById("labsTableBody");
        tbody.innerHTML = "";
        
        allLabsData.forEach((lab, index) => {
            let badgeClass = "status-inactive";
            let statusText = lab.status.toUpperCase();
            
            if(statusText === "ACTIVE") badgeClass = "status-active";
            else if(statusText === "CANCEL") badgeClass = "status-cancel";

            let tr = document.createElement("tr");
            tr.innerHTML = `
                <td style="font-weight:600;">${lab.lab_name}</td>
                <td>${lab.email}</td>
                <td>${lab.city} - ${lab.pincode}</td>
                <td><span class="status-badge ${badgeClass}">${statusText}</span></td>
                <td><button class="btn-edit" onclick="openModal(${index})"><i class="fas fa-search"></i> Review Docs</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function openModal(index) {
        const lab = allLabsData[index];
        currentEditUid = lab.user_id;

        // Basic Info
        document.getElementById("modalLabName").innerText = lab.lab_name;
        document.getElementById("modalUid").innerText = lab.user_id;
        document.getElementById("modalEmail").innerText = lab.email;
        document.getElementById("modalAddress").innerText = lab.address || "N/A";
        document.getElementById("modalCityPin").innerText = lab.city + " - " + lab.pincode;

        // 1. Documents (Reg, NABL, NABH)
        const docsDiv = document.getElementById("modalDocs");
        docsDiv.innerHTML = "";
        
        if(lab.reg_doc_url) docsDiv.innerHTML += `<a href="${lab.reg_doc_url}" target="_blank" class="doc-link"><i class="fas fa-file-pdf"></i> Registration Doc</a>`;
        
        if(lab.nabl === "Yes" && lab.nabl_url) docsDiv.innerHTML += `<a href="${lab.nabl_url}" target="_blank" class="doc-link"><i class="fas fa-check-circle"></i> NABL Certificate</a>`;
        else docsDiv.innerHTML += `<div class="doc-none">NABL: No</div>`;
        
        if(lab.nabh === "Yes" && lab.nabh_url) docsDiv.innerHTML += `<a href="${lab.nabh_url}" target="_blank" class="doc-link"><i class="fas fa-check-circle"></i> NABH Certificate</a>`;
        else docsDiv.innerHTML += `<div class="doc-none">NABH: No</div>`;

        // 2. Images
        const imgDiv = document.getElementById("modalImages");
        imgDiv.innerHTML = "";
        if(lab.img1_url) imgDiv.innerHTML += `<a href="${lab.img1_url}" target="_blank" class="doc-link"><i class="fas fa-image"></i> Lab Image 1</a>`;
        else imgDiv.innerHTML += `<div class="doc-none">Image 1: None</div>`;
        
        if(lab.img2_url) imgDiv.innerHTML += `<a href="${lab.img2_url}" target="_blank" class="doc-link"><i class="fas fa-image"></i> Lab Image 2</a>`;
        if(lab.img3_url) imgDiv.innerHTML += `<a href="${lab.img3_url}" target="_blank" class="doc-link"><i class="fas fa-image"></i> Lab Image 3</a>`;

        // 3. Timings
        const timeDiv = document.getElementById("modalTimings");
        timeDiv.innerHTML = "";
        daysArr.forEach(day => {
            let t = lab.timings[day];
            let isClosed = (t.open === "Closed" || !t.open || t.open === "");
            let text = isClosed ? "Closed" : `${t.open} to ${t.close}`;
            let cls = isClosed ? "time-card closed" : "time-card";
            
            timeDiv.innerHTML += `
                <div class="${cls}">
                    <div class="time-day">${day}</div>
                    <div class="time-val">${text}</div>
                </div>
            `;
        });

        // 4. Set Status Select
        const statusVal = lab.status.charAt(0).toUpperCase() + lab.status.slice(1).toLowerCase();
        let sel = document.getElementById("modalStatusSelect");
        sel.value = "Inactive"; 
        for(let i=0; i<sel.options.length; i++){
            if(sel.options[i].value.toLowerCase() === statusVal.toLowerCase()){
                sel.selectedIndex = i; break;
            }
        }

        // 5. Render Services Checkboxes
        const servicesGrid = document.getElementById("modalServicesGrid");
        servicesGrid.innerHTML = "";
        servicesList.forEach(srv => {
            let isChecked = lab.services[srv] === "Yes";
            let displayName = srv.replace("_", " ").toUpperCase();
            let label = document.createElement("label");
            label.innerHTML = `<input type="checkbox" id="admin_srv_${srv}" ${isChecked ? 'checked' : ''}> ${displayName}`;
            servicesGrid.appendChild(label);
        });

        document.getElementById("editModal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("editModal").style.display = "none";
        currentEditUid = null;
    }

    function saveLabDetails() {
        if(!currentEditUid) return;

        const btn = document.getElementById("saveBtn");
        btn.innerText = "Updating & Sending Email... Please wait";
        btn.disabled = true;

        const updatedStatus = document.getElementById("modalStatusSelect").value;
        let updatedServices = {};

        servicesList.forEach(srv => {
            updatedServices[srv] = document.getElementById("admin_srv_" + srv).checked;
        });

        const payload = {
            action: "updateAdminLab",
            user_id: currentEditUid,
            status: updatedStatus,
            services: updatedServices
        };

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            btn.innerText = "Update & Notify Lab";
            btn.disabled = false;
            
            if(data.status === "success") {
                alert("Lab updated and email sent successfully!");
                closeModal();
                fetchLabs(); 
            } else {
                alert("Error: " + data.message);
            }
        })
        .catch(err => {
            btn.innerText = "Update & Notify Lab";
            btn.disabled = false;
            alert("Network Error!");
            console.error(err);
        });
    }
</script>

</body>
</html>
