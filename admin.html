<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - BhavyaCare</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Base Styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 🌟 Mobile-Friendly Header 🌟 */
        .admin-header {
            background-color: #0056b3;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .admin-header h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 800;
        }
        
        .admin-header h2 span {
            color: #28a745; /* Green color for Care */
        }

        .logout-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background-color: #c82333;
        }

        /* 🌟 Dashboard Container 🌟 */
        .dashboard-container {
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .welcome-text {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
        }

        /* 🌟 Mobile-First Grid System 🌟 */
        .dashboard-grid {
            display: grid;
            /* Mobile par 2 box ek line me aayenge, badi screen par jyada */
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        /* 🌟 Dashboard Cards 🌟 */
        .card {
            background: white;
            padding: 25px 15px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            text-align: center;
            text-decoration: none;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border-bottom: 4px solid transparent;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        /* Alag-alag cards ke colors */
        .card-patient:hover { border-bottom-color: #28a745; }
        .card-doctor:hover { border-bottom-color: #0056b3; }
        .card-hospital:hover { border-bottom-color: #17a2b8; }
        .card-lab:hover { border-bottom-color: #8e44ad; }
        .card-pharmacy:hover { border-bottom-color: #d35400; }
        .card-executive:hover { border-bottom-color: #e67e22; }

        .card i {
            font-size: 35px;
            margin-bottom: 12px;
        }

        /* Icon Colors */
        .card-patient i { color: #28a745; }
        .card-doctor i { color: #0056b3; }
        .card-hospital i { color: #17a2b8; }
        .card-lab i { color: #8e44ad; }
        .card-pharmacy i { color: #d35400; }
        .card-executive i { color: #e67e22; }

        .card h3 {
            margin: 0;
            font-size: 15px;
            font-weight: bold;
        }

        .card p {
            margin: 5px 0 0 0;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

    <header class="admin-header">
        <h2>Bhavya<span>Admin</span></h2>
        <a href="../index.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Exit</a>
    </header>

    <div class="dashboard-container">
        <div class="welcome-text">
            <h3>Hi, Admin 👋</h3>
            <p style="font-size: 14px; color: #666; margin-top: -10px;">What would you like to manage today?</p>
        </div>

        <div class="dashboard-grid">
            
            <a href="patient_admin/patient_admin.html" class="card card-patient">
                <i class="fas fa-user-injured"></i>
                <h3>Manage Patients</h3>
                <p>View & Edit</p>
            </a>

            <a href="#" class="card card-doctor" onclick="alert('Doctor Panel Coming Soon!')">
                <i class="fas fa-user-md"></i>
                <h3>Manage Doctors</h3>
                <p>Approvals & List</p>
            </a>

            <a href="#" class="card card-hospital" onclick="alert('Hospital Panel Coming Soon!')">
                <i class="fas fa-hospital"></i>
                <h3>Manage Hospitals</h3>
                <p>Facilities & Beds</p>
            </a>

            <a href="#" class="card card-lab" onclick="alert('Lab Panel Coming Soon!')">
                <i class="fas fa-flask"></i>
                <h3>Manage Labs</h3>
                <p>Tests & Bookings</p>
            </a>

            <a href="#" class="card card-pharmacy" onclick="alert('Pharmacy Panel Coming Soon!')">
                <i class="fas fa-pills"></i>
                <h3>Pharmacies</h3>
                <p>Orders & Stock</p>
            </a>

            <a href="#" class="card card-executive" onclick="alert('Executive Panel Coming Soon!')">
                <i class="fas fa-motorcycle"></i>
                <h3>Executives</h3>
                <p>Delivery & Tasks</p>
            </a>

        </div>
    </div>

</body>
</html>
