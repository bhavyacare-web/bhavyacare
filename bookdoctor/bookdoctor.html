<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Doctor | BhavyaCare</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .header { background: #0056b3; color: white; padding: 15px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header-top { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { margin: 0; font-size: 22px; }
        
        .filter-bar { max-width: 1100px; margin: 15px auto 0; display: flex; gap: 10px; flex-wrap: wrap; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; }
        .filter-bar input, .filter-bar select { padding: 10px; border: none; border-radius: 5px; font-size: 14px; outline: none; flex: 1; min-width: 140px; }
        .filter-bar button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s;}
        .filter-bar button:hover { background: #218838; }
        
        .doctors-grid { max-width: 1100px; margin: 20px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 0 15px; }
        .doc-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 20px; text-align: center; border: 1px solid #eaeaea; position: relative;}
        
        .img-container { width: 100px; height: 100px; margin: 0 auto 10px; border-radius: 50%; overflow: hidden; border: 3px solid #0056b3; padding: 2px; }
        .doc-card img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .doc-card h3 { color: #333; margin: 5px 0; font-size: 20px; }
        .doc-speciality { font-weight: bold; color: #e67e22; font-size: 14px; margin-bottom: 5px;}
        .doc-exp { background: #fff3cd; color: #856404; display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 13px; font-weight: bold; margin-bottom: 10px;}
        
        .badges-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; display: inline-block; }
        .avail-yes { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .avail-no { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .type-online { background: #cce5ff; color: #004085; border: 1px solid #b8daff; }
        .type-offline { background: #e2e3e5; color: #383d41; border: 1px solid #d6d8db; }
        
        .fees { margin: 10px 0; background: #f8f9fa; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: bold; color: #333; border: 1px dashed #ccc;}
        .discount-price { color: #28a745; font-size: 16px; margin-left: 5px;}
        
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-schedule { background: #e2e8f0; color: #333; border: none; padding: 10px; border-radius: 5px; flex: 1; cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-schedule:hover { background: #cbd5e1; }
        .btn-book { background: #0056b3; color: white; border: none; padding: 10px; border-radius: 5px; flex: 1; font-size: 13px; font-weight: bold; cursor: pointer; }
        .btn-book:hover { background: #004494; }

        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: white; width: 90%; max-width: 550px; border-radius: 10px; padding: 25px; box-sizing: border-box; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #888; }
        
        .schedule-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .schedule-table th, .schedule-table td { padding: 10px 8px; border: 1px solid #ddd; text-align: center; }
        .schedule-table th { background: #f4f4f4; color: #333;}
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; font-size: 14px;}
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; outline: none;}
        .form-group input:focus, .form-group select:focus { border-color: #0056b3; }
        .time-info { font-size: 13px; color: #28a745; margin-top: 5px; font-weight: bold; display: none; }
        
        #paymentSection { display: none; background: #e8f5e9; padding: 15px; border-radius: 8px; border: 1px dashed #28a745; margin-top: 15px; text-align: center; }
        #loader { text-align: center; color: #0056b3; padding: 20px; font-weight: bold; font-size: 18px; }

        /* 🌟 LOGIN POPUP STYLES 🌟 */
        #login-section { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; background: white; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2), 0 0 0 9999px rgba(0,0,0,0.6); border-radius: 10px; text-align: center; z-index: 9999; }
        #login-section h3 { color: #333; margin-bottom: 20px; }
        .input-box { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; outline: none; box-sizing: border-box;}
        .action-btn { width: 100%; background-color: #28a745; color: white; border: none; padding: 12px; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;}
    </style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <a href="../index.html" style="color:white; text-decoration:none; font-weight:bold;">⬅ Home</a>
        <h2>Find & Book a Doctor</h2>
        <div style="width: 50px;"></div>
    </div>
    
    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Search Doctor, Speciality, City...">
        <select id="filterType">
            <option value="Any">Consult Type: Any</option>
            <option value="Offline">Clinic Visit</option>
            <option value="Online">Online Video/Call</option>
        </select>
        <select id="filterDay">
            <option value="Any">Day: Any</option>
            <option value="mon">Monday</option><option value="tue">Tuesday</option>
            <option value="wed">Wednesday</option><option value="thu">Thursday</option>
            <option value="fri">Friday</option><option value="sat">Saturday</option>
            <option value="sun">Sunday</option>
        </select>
        <input type="time" id="filterTime">
        <button onclick="applyFilters()">Search</button>
    </div>
</div>

<div id="loader">Fetching doctors... ⏳</div>
<div class="doctors-grid" id="doctorsContainer"></div>

<div id="login-section">
    <button class="close-btn" onclick="closeLoginPopup()" style="position:absolute; top:10px; right:15px; font-size:24px;">&times;</button>
    <h3 id="form-title">Patient Login</h3>
    
    <div id="phone-section">
        <div id="partner-role-container" style="display: none;">
            <select id="partnerRole" class="input-box"><option value="patient" selected>Patient</option></select>
        </div>
        
        <p id="nameLabel" style="text-align: left; font-size: 14px; color: #666; margin-bottom: 2px;">Full Name:</p>
        <input type="text" id="userName" class="input-box" placeholder="Enter your full name">

        <p style="text-align: left; font-size: 14px; color: #666; margin-bottom: 2px;">Mobile Number:</p>
        <input type="tel" id="phoneNumber" class="input-box" placeholder="e.g. 8950112467" maxlength="10">
        
        <div id="recaptcha-container" style="margin-top: 10px;"></div>
        <button id="send-otp-btn" class="action-btn" onclick="sendOTP()">Get OTP</button>
    </div>

    <div id="otp-section" style="display: none;">
        <p style="text-align: left; font-size: 14px; color: #666; margin-bottom: 2px;">Enter OTP:</p>
        <input type="tel" id="otpCode" class="input-box" placeholder="6-digit OTP" maxlength="6">
        <button class="action-btn" style="background-color: #0056b3;" onclick="verifyOTP()">Verify Mobile</button>
    </div>
</div>

<div class="modal-overlay" id="scheduleModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="scheduleDocName">Doctor Schedule</h3>
            <button class="close-btn" onclick="closeSchedule()">&times;</button>
        </div>
        <div id="scheduleContent"></div>
    </div>
</div>

<div class="modal-overlay" id="bookingModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalDocName">Book Appointment</h3>
            <button class="close-btn" onclick="closeModal()">&times;</button>
        </div>
        <form id="bookingForm">
            <div class="form-group">
                <label>1. Select Consultation Type</label>
                <select id="consultType" onchange="handleTypeChange()" required></select>
            </div>
            
            <div class="form-group">
                <label>2. Choose Appointment Date</label>
                <input type="date" id="apptDate" onchange="checkSchedule()" required>
                <div id="availabilityMsg" class="time-info"></div>
            </div>
            
            <div class="form-group">
                <label>3. Select Preferred Time</label>
                <input type="time" id="apptTime" required disabled>
            </div>
            
            <div id="paymentSection">
                <h4 style="margin: 0 0 10px; color: #155724;">Online Payment Required</h4>
                <p style="margin: 0; font-size: 14px;">UPI ID: <strong id="payUpiId"></strong></p>
                <p style="margin: 5px 0 15px; font-size: 18px; font-weight: bold; color: #d32f2f;">Pay (10% Off): ₹<span id="payAmount"></span></p>
                <img id="qrImage" src="" alt="QR Code" style="width:150px; height:150px; border: 5px solid white; border-radius: 8px;">
                <div class="form-group" style="text-align: left; margin-top: 15px;">
                    <label>Upload Payment Screenshot *</label>
                    <input type="file" id="paymentScreenshot" accept="image/*">
                </div>
            </div>

            <button type="button" class="btn-book" id="submitBtn" onclick="submitBooking()" style="margin-top: 15px; padding: 12px; font-size: 16px;">Confirm & Book</button>
            <div id="btnLoader" style="display:none; text-align:center; font-weight:bold; color:#0056b3; margin-top:15px;">Processing... ⏳</div>
        </form>
    </div>
</div>

<script src="../app.js"></script>
<script src="bookdoctor.js"></script>
</body>
</html>
