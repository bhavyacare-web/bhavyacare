<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Doctor | BhavyaCare</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .header { background: #0056b3; color: white; padding: 15px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header-top { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { margin: 0; font-size: 22px; }
        
        /* SEARCH & FILTERS */
        .filter-bar { max-width: 1100px; margin: 15px auto 0; display: flex; gap: 10px; flex-wrap: wrap; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; }
        .filter-bar input, .filter-bar select { padding: 10px; border: none; border-radius: 5px; font-size: 14px; outline: none; flex: 1; min-width: 140px; box-sizing: border-box; }
        .filter-bar button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s;}
        .filter-bar button:hover { background: #218838; }
        
        /* 🌟 MODERN CIRCULAR RECTANGLE CARD DESIGN 🌟 */
        .doctors-grid { max-width: 1100px; margin: 20px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 15px; padding: 0 15px; }
        
        .doc-card { background: white; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); padding: 16px; border: 1px solid #f0f4f8; position: relative; display: flex; flex-direction: column; transition: 0.3s; }
        .doc-card:hover { box-shadow: 0 8px 25px rgba(0,86,179,0.12); transform: translateY(-3px); border-color: #cce5ff; }
        
        .doc-exp-corner { position: absolute; top: 16px; right: 16px; background: #fff3cd; color: #856404; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; box-shadow: 0 2px 5px rgba(0,0,0,0.05); letter-spacing: 0.5px;}
        
        .doc-card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .img-container { width: 70px; height: 70px; flex-shrink: 0; border-radius: 50%; overflow: hidden; border: 2px solid #0056b3; padding: 2px; }
        .doc-card img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .doc-info { text-align: left; padding-right: 30px; }
        .doc-info h3 { color: #1a202c; margin: 0 0 2px 0; font-size: 18px; line-height: 1.2;}
        .doc-speciality { font-weight: 800; color: #0056b3; font-size: 13px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px;}
        .doc-qual { font-size: 11px; color: #718096; font-weight: 600;}
        
        .doc-location { margin: 0 0 10px 0; color: #4a5568; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; background: #f8fafc; padding: 8px 12px; border-radius: 16px; border: 1px solid #edf2f7;}
        
        .badges-container { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; display: inline-block; }
        .avail-yes { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .avail-no { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .type-online { background: #cce5ff; color: #004085; border: 1px solid #b8daff; }
        .type-offline { background: #e2e3e5; color: #383d41; border: 1px solid #d6d8db; }
        
        /* Fees section in pill shape */
        .fees { margin: 5px 0 12px 0; display: flex; justify-content: space-between; align-items: center; gap: 10px;}
        .fee-box { flex: 1; background: #f8fafc; padding: 8px 5px; border-radius: 16px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;}
        .fee-box span.title { color:#64748b; font-size:10px; font-weight:800; text-transform: uppercase; margin-bottom: 2px;}
        .fee-box span.discount-price { color: #28a745; font-size: 15px; font-weight: 800; margin-left: 2px;}
        .fee-box del { color:#a0aec0; font-size:11px;}
        
        /* Rounded Buttons */
        .action-btns { display: flex; gap: 10px; margin-top: auto; }
        .btn-schedule { background: #e2e8f0; color: #333; border: none; padding: 10px; border-radius: 24px; flex: 1; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s;}
        .btn-schedule:hover { background: #cbd5e1; }
        .btn-book { background: #0056b3; color: white; border: none; padding: 10px; border-radius: 24px; flex: 1; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,86,179,0.2);}
        .btn-book:hover { background: #004494; transform: translateY(-1px);}

        /* 🌟 CHECKOUT MODAL STYLES 🌟 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .modal { background: white; width: 90%; max-width: 500px; border-radius: 15px; padding: 30px; box-sizing: border-box; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f0f4f8; padding-bottom: 15px; margin-bottom: 20px; }
        .close-btn { background: #f1f5f9; border: none; font-size: 20px; cursor: pointer; color: #64748b; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s;}
        .close-btn:hover { background: #e2e8f0; color: #dc3545; }
        
        .schedule-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .schedule-table th, .schedule-table td { padding: 10px 8px; border: 1px solid #ddd; text-align: center; }
        .schedule-table th { background: #f4f4f4; color: #333;}
        
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #2d3748; font-size: 14px;}
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; background: #fff; transition: 0.3s;}
        .form-group input:focus, .form-group select:focus { border-color: #0056b3; box-shadow: 0 0 0 3px rgba(0,86,179,0.1); }
        .time-info { font-size: 13px; color: #28a745; margin-top: 8px; font-weight: bold; display: none; background: #d4edda; padding: 8px; border-radius: 5px; border-left: 4px solid #28a745;}
        
        /* RADIO BUTTONS FOR CONSULT TYPE */
        .consult-type-group { display: flex; gap: 10px; }
        .consult-type-group input[type="radio"] { display: none; }
        .consult-type-group label { flex: 1; text-align: center; padding: 12px 10px; border: 2px solid #cbd5e0; border-radius: 8px; font-weight: bold; color: #4a5568; cursor: pointer; transition: 0.3s; background: #f8fafc; font-size: 14px;}
        .consult-type-group input[type="radio"]:checked + label { border-color: #0056b3; background: #ebf8ff; color: #0056b3; box-shadow: 0 4px 10px rgba(0,86,179,0.15); }
        
        #paymentSection { display: none; background: #f0fdf4; padding: 20px; border-radius: 10px; border: 2px dashed #4ade80; margin-top: 15px; text-align: center; }
        #loader { text-align: center; color: #0056b3; padding: 40px; font-weight: bold; font-size: 18px; }

        /* 🌟 DIRECT UPI & QR BUTTON STYLES 🌟 */
        .upi-pay-btn { display: inline-block; background-color: #28a745; color: white; padding: 14px 25px; border-radius: 30px; border: none; font-size: 16px; font-weight: bold; margin-bottom: 10px; width: 100%; box-sizing: border-box; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3); transition: 0.3s; cursor: pointer; }
        .upi-pay-btn:hover { background-color: #218838; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4); }

        /* LOGIN POPUP STYLES */
        #login-section { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; background: white; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.3), 0 0 0 9999px rgba(0,0,0,0.6); border-radius: 12px; text-align: center; z-index: 9999; }
        #login-section h3 { color: #333; margin-bottom: 20px; font-size: 22px; }
        .input-box { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; outline: none; box-sizing: border-box;}
        .action-btn { width: 100%; background-color: #28a745; color: white; border: none; padding: 12px; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;}
        
        @media (max-width: 600px) {
            .doctors-grid { grid-template-columns: 1fr; }
            .consult-type-group label { font-size: 13px; padding: 10px 5px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <a href="../index.html" style="color:white; text-decoration:none; font-weight:bold; font-size:16px;">⬅ Back</a>
        <h2>Find & Book a Doctor</h2>
        <div style="width: 50px;"></div>
    </div>
    
    <div class="filter-bar">
        <input type="text" id="searchName" placeholder="🔍 Name, Speciality, or Symptom (e.g. Fever, Pet Dard)...">
        <input type="text" id="searchCity" placeholder="📍 City (e.g. Delhi)">
        
        <select id="filterType">
            <option value="Any">Consult Type: Any</option>
            <option value="Offline">Clinic Visit</option>
            <option value="Online">Online Video/Call</option>
        </select>
        <select id="filterDay">
            <option value="Any">Day: Any</option>
            <option value="mon">Monday</option><option value="tue">Tuesday</option>
            <option value="wed">Wednesday</option><option value="thu">Thursday</option>
            <option value="fri">Friday</option><option value="sat">Saturday</option>
            <option value="sun">Sunday</option>
        </select>
        <input type="text" id="filterTime" placeholder="⏰ Select Time" onfocus="this.type='time'" onblur="if(!this.value) this.type='text'">
        <button onclick="applyFilters()">Search</button>
    </div>
</div>

<div id="loader">Fetching available doctors... ⏳</div>
<div class="doctors-grid" id="doctorsContainer"></div>

<div id="login-section">
    <button class="close-btn" onclick="closeLoginPopup()" style="position:absolute; top:15px; right:15px;">&times;</button>
    <h3 id="form-title">Patient Login to Book</h3>
    
    <div id="phone-section">
        <div id="partner-role-container" style="display: none;">
            <select id="partnerRole" class="input-box"><option value="patient" selected>Patient</option></select>
        </div>
        
        <p id="nameLabel" style="text-align: left; font-size: 14px; color: #666; margin-bottom: 2px;">Full Name:</p>
        <input type="text" id="userName" class="input-box" placeholder="Enter your full name">

        <p style="text-align: left; font-size: 14px; color: #666; margin-bottom: 2px;">Mobile Number:</p>
        <input type="tel" id="phoneNumber" class="input-box" placeholder="e.g. 8950112467" maxlength="10">
        
        <div id="recaptcha-container" style="margin-top: 10px;"></div>
        <button id="send-otp-btn" class="action-btn" onclick="sendOTP()">Get OTP</button>
    </div>

    <div id="otp-section" style="display: none;">
        <p style="text-align: left; font-size: 14px; color: #666; margin-bottom: 2px;">Enter OTP:</p>
        <input type="tel" id="otpCode" class="input-box" placeholder="6-digit OTP" maxlength="6">
        <button class="action-btn" style="background-color: #0056b3;" onclick="verifyOTP()">Verify Mobile</button>
    </div>
</div>

<div class="modal-overlay" id="scheduleModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="scheduleDocName" style="margin:0; color:#0056b3;">Doctor Schedule</h3>
            <button class="close-btn" onclick="closeSchedule()">&times;</button>
        </div>
        <div id="scheduleContent"></div>
    </div>
</div>

<div class="modal-overlay" id="bookingModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalDocName" style="margin:0; color:#0056b3;">Book Appointment</h3>
            <button class="close-btn" onclick="closeModal()">&times;</button>
        </div>
        <form id="bookingForm">
            
            <div class="form-group">
                <label>1. Select Consultation Type</label>
                <div class="consult-type-group" id="consultTypeGroup"></div>
                <input type="hidden" id="consultType" required>
            </div>
            
            <div class="form-group">
                <label>2. Choose Appointment Date</label>
                <input type="text" id="apptDate" placeholder="📅 Select Date" onfocus="this.type='date'" onblur="if(!this.value) this.type='text'" onchange="checkSchedule()" required>
                <div id="availabilityMsg" class="time-info"></div>
            </div>
            
            <div class="form-group">
                <label>3. Select Preferred Time</label>
                <input type="text" id="apptTime" placeholder="⏰ Select Time" onfocus="this.type='time'; if(this.dataset.val24) this.value=this.dataset.val24;" onblur="formatTimeDisplay(this)" required disabled>
            </div>
            
            <div id="paymentSection">
                <h4 style="margin: 0 0 10px; color: #155724; font-size: 18px;"><i class="fas fa-shield-check"></i> Secure Online Payment</h4>
                <p style="margin: 0 0 5px; font-size: 14px; color:#555;">UPI ID: <strong id="payUpiId" style="color:#333;"></strong></p>
                <p style="margin: 0 0 15px; font-size: 20px; font-weight: bold; color: #d32f2f;">Pay (10% Off): ₹<span id="payAmount"></span></p>
                
                <button type="button" id="payUpiBtn" class="upi-pay-btn" onclick="openUPI()">
                    <i class="fas fa-rupee-sign"></i> Pay Now via UPI App
                </button>
                
                <button type="button" class="btn-schedule" onclick="toggleQR()" style="width:100%; margin-bottom: 15px; border-radius: 30px;">
                    <i class="fas fa-qrcode"></i> Show QR Code to Pay
                </button>
                
                <div id="qrContainer" style="display:none; margin-bottom: 15px;">
                    <img id="qrImage" src="" alt="QR Code" style="width:160px; height:160px; border: 4px solid white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                </div>

                <div class="form-group" style="text-align: left; margin-top: 10px;">
                    <label style="color:#155724;">Upload Payment Screenshot *</label>
                    <input type="file" id="paymentScreenshot" accept="image/*" style="padding:8px; border: 1px solid #4ade80;">
                    <p style="font-size:11px; color:#666; margin-top:5px;">Please upload screenshot after successful payment.</p>
                </div>
            </div>

            <button type="button" class="btn-book" id="submitBtn" onclick="submitBooking()" style="margin-top: 10px; padding: 15px; font-size: 16px; width: 100%; border-radius: 12px;">Confirm & Book Appointment</button>
            <div id="btnLoader" style="display:none; text-align:center; font-weight:bold; color:#0056b3; margin-top:15px; padding: 15px;">Processing your booking... ⏳</div>
        </form>
    </div>
</div>

<script src="../app.js"></script>

<script>
    firebase.auth().onAuthStateChanged((user) => {
        if (user && document.getElementById("login-section").style.display === "block") {
            setTimeout(() => {
                window.location.replace(window.location.href.split('#')[0]); 
            }, 300);
        }
    });
</script>

<script src="bookdoctor.js"></script>
</body>
</html>
