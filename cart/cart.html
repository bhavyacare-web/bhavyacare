<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - BhavyaCare</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; }
        .step-card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: #007bff; color: white; }
        .btn-primary:hover { background: #0056b3; }
        .btn-success { background: #28a745; color: white; width: 100%; font-size: 1.1em; padding: 15px; }
        .btn-warning { background: #ff9800; color: white; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .readonly-input { background-color: #e9ecef; cursor: not-allowed; }
        .cart-item { border: 1px solid #eee; padding: 15px; margin-bottom: 15px; border-radius: 8px; background: #fafafa; }
        .warning-box { background: #fff3cd; color: #856404; padding: 15px; border-radius: 8px; border: 1px solid #ffeeba; margin-bottom: 15px; }
        
        /* Lab Item Style */
        .lab-item { display: flex; align-items: center; border: 1px solid #e0e0e0; padding: 15px; margin-top: 15px; border-radius: 8px; background: #fff; }
        .lab-image { width: 90px; height: 90px; object-fit: cover; border-radius: 8px; margin-right: 15px; border: 1px solid #ddd; }

        /* Login Popup Styles (From your header) */
        #login-section { width: 90%; max-width: 400px; margin: auto; padding: 30px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-radius: 10px; text-align: center; display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
        .input-box { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;}
        .action-btn { width: 100%; background-color: #28a745; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #0056b3; border-bottom: 2px solid #0056b3; padding-bottom: 10px;">Review Your Cart</h2>

    <div id="step-1" class="step-card">
        <h3 style="margin-top: 0; color: #333;">Step 1: Patient Information</h3>
        
        <div id="auth-warning" class="warning-box hidden" style="text-align: center;">
            <h4 style="margin-top: 0;">Login Required</h4>
            <p>Please login to your account to confirm the booking.</p>
            <button id="btn-trigger-login" class="btn btn-warning" style="padding: 10px 25px; font-size: 16px;">
                Login / Sign Up via OTP
            </button>
        </div>
        
        <form id="my-info-form" class="hidden">
            <div class="form-group" id="patient-name-container"></div>
            
            <div class="form-group">
                <label>Mobile Number (Cannot be changed)</label>
                <input type="text" id="patient-mobile" class="readonly-input" readonly>
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" id="patient-address" required placeholder="Enter complete address">
            </div>
            <div class="form-group">
                <label>Pincode</label>
                <input type="text" id="patient-pincode" required placeholder="e.g. 110001">
            </div>
            <button type="button" class="btn btn-primary" id="btn-save-step-1">Save & Continue</button>
        </form>
    </div>

    <div id="step-2" class="step-card hidden">
        <h3 style="margin-top: 0; color: #333;">Step 2: Select Lab & Services</h3>
        <div id="cart-items-container"></div>
        <div id="labs-container" style="margin-top: 20px;"></div>
        
        <div id="schedule-section" class="hidden form-group" style="margin-top: 20px; background: #e9f5ff; padding: 15px; border-radius: 8px;">
            <label>Select Date</label>
            <input type="date" id="booking-date" style="margin-bottom: 15px;">
            <label>Select Time</label>
            <input type="time" id="booking-time">
        </div>
    </div>

    <div id="step-3" class="step-card hidden">
        <h3 style="margin-top: 0; color: #28a745;">Step 3: Checkout</h3>
        <button type="button" class="btn btn-success" id="btn-confirm-booking" disabled>Confirm Booking</button>
    </div>
</div>

<div class="overlay" id="login-overlay"></div>
<div id="login-section">
    <h3 id="form-title">Login / Sign Up</h3>
    <div id="phone-section">
        <input type="text" id="userName" class="input-box" placeholder="Full Name (Required for new users)">
        <input type="tel" id="phoneNumber" class="input-box" placeholder="Mobile Number (e.g. 8950112467)" maxlength="10">
        <div id="recaptcha-container" style="margin-top: 10px;"></div>
        <button id="send-otp-btn" class="action-btn" onclick="sendOTP()">Get OTP</button>
        <p style="margin-top: 15px; font-size: 13px; color: red; cursor: pointer;" onclick="closeLoginModal()">Close</p>
    </div>
    <div id="otp-section" style="display: none;">
        <input type="tel" id="otpCode" class="input-box" placeholder="6-digit OTP" maxlength="6">
        <button class="action-btn" style="background-color: #0056b3;" onclick="verifyOTP()">Verify Mobile</button>
        <p style="margin-top: 15px; font-size: 13px; color: #0056b3; cursor: pointer; text-decoration: underline;" onclick="closeLoginModal()">Cancel</p>
    </div>
</div>

<script src="app.js"></script> 
<script src="cart.js"></script>
</body>
</html>
