<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard | BhavyaCare</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #f4f7f6; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: #0056b3; color: white; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h2 { margin: 0; font-size: 20px; }
        .sidebar-menu { flex-grow: 1; padding: 20px 0; list-style: none; margin: 0; }
        .sidebar-menu li { padding: 15px 20px; cursor: pointer; transition: 0.3s; font-size: 16px; border-left: 4px solid transparent; }
        .sidebar-menu li:hover, .sidebar-menu li.active { background: rgba(255,255,255,0.1); border-left-color: #28a745; }
        .logout-btn { padding: 15px 20px; background: #dc3545; color: white; text-align: center; cursor: pointer; font-weight: bold; border-top: 1px solid rgba(255,255,255,0.1); }
        .logout-btn:hover { background: #c82333; }

        /* Main Content */
        .main-content { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .top-bar h1 { margin: 0; color: #333; font-size: 24px; }
        .doc-name-badge { background: white; padding: 10px 20px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: bold; color: #0056b3; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; border-bottom: 4px solid #0056b3; }
        .stat-card h3 { margin: 0 0 10px; color: #666; font-size: 14px; text-transform: uppercase; }
        .stat-card p { margin: 0; font-size: 28px; font-weight: bold; color: #333; }

        /* Table Area */
        .table-container { background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f8fafc; padding: 15px; color: #555; font-size: 14px; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: middle; }
        tr:hover { background: #fdfdfd; }

        /* Status Badges */
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; text-align: center; }
        .bg-warning { background: #fff3cd; color: #856404; }
        .bg-info { background: #cce5ff; color: #004085; }
        .bg-success { background: #d4edda; color: #155724; }
        .bg-danger { background: #f8d7da; color: #721c24; }

        /* Action Buttons */
        .btn { border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold; color: white; transition: 0.3s; margin: 2px; }
        .btn-approve { background: #28a745; }
        .btn-approve:hover { background: #218838; }
        .btn-complete { background: #0056b3; }
        .btn-complete:hover { background: #004494; }
        .btn-noshow { background: #dc3545; }
        .btn-noshow:hover { background: #c82333; }
        .btn-join { background: #fd7e14; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(253, 126, 20, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(253, 126, 20, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(253, 126, 20, 0); }
        }

        #loader { text-align: center; padding: 50px; font-size: 18px; color: #0056b3; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>BhavyaCare</h2>
            <p style="font-size: 12px; margin: 5px 0 0; color: #cce5ff;">Doctor Panel</p>
        </div>
        <ul class="sidebar-menu">
            <li class="active">📅 Appointments</li>
        </ul>
        <div class="logout-btn" onclick="logoutDoctor()">🚪 Logout</div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1>Manage Appointments</h1>
            <div class="doc-name-badge">👨‍⚕️ Dr. <span id="displayDocName">Loading...</span></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card" style="border-color: #ffc107;">
                <h3>Pending Approval</h3>
                <p id="statPending">0</p>
            </div>
            <div class="stat-card" style="border-color: #17a2b8;">
                <h3>Upcoming Calls/Visits</h3>
                <p id="statApproved">0</p>
            </div>
            <div class="stat-card" style="border-color: #28a745;">
                <h3>Total Earnings</h3>
                <p style="color:#28a745;">₹<span id="statEarnings">0</span></p>
            </div>
        </div>

        <div class="table-container">
            <div id="loader">Loading Appointments... ⏳</div>
            <table id="apptTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Type</th>
                        <th>Patient ID</th>
                        <th>Appt Status</th>
                        <th>Payment</th>
                        <th>Earning</th>
                        <th style="text-align: center;">Actions</th>
                    </tr>
                </thead>
                <tbody id="apptTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="doctor_dashboard.js"></script>
</body>
</html>
