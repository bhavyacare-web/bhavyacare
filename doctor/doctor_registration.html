<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Profile Setup - BhavyaCare</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #0056b3; text-align: center; }
        label { font-weight: bold; margin-top: 15px; display: block; color: #333; }
        input[type="text"], input[type="tel"], input[type="number"], select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        input[type="file"] { margin-top: 5px; }
        .btn-submit { background-color: #28a745; color: white; padding: 12px; width: 100%; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 25px; }
        .btn-submit:hover { background-color: #218838; }
        #loader { display: none; text-align: center; color: #0056b3; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Doctor Profile Setup</h2>
    <p style="text-align:center; color:#666;">Please complete your profile to start accepting appointments.</p>

    <form id="doctorProfileForm">
        <label>Full Name</label>
        <input type="text" id="docName" readonly>

        <label>Mobile Number</label>
        <input type="tel" id="docPhone" readonly>

        <label>Speciality (e.g. Cardiologist, Dermatologist)</label>
        <input type="text" id="docSpeciality" required>

        <label>Clinic Complete Address (City, Pincode)</label>
        <input type="text" id="docAddress" required>

        <label>Clinic Visit Fee (₹)</label>
        <input type="number" id="offlineFee" required>

        <label>Are you available for Online Consultation?</label>
        <select id="onlineAvailable" onchange="toggleOnlineFields()">
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <div id="onlineFields">
            <label>Online Consultation Fee (₹)</label>
            <input type="number" id="onlineFee" value="0">

            <label>Your UPI ID (For online payments)</label>
            <input type="text" id="upiId" placeholder="e.g. 9876543210@ybl">
        </div>

        <label>Upload Medical Registration Document (PDF/Image)</label>
        <input type="file" id="regDocument" accept="image/*,.pdf" required>

        <label>Upload Your Profile Photo (Image)</label>
        <input type="file" id="doctorImage" accept="image/*" required>

        <button type="button" class="btn-submit" onclick="submitProfile()">Submit Profile</button>
        <div id="loader">Uploading Details & Files... Please wait ⏳</div>
    </form>
</div>

<script>
    // URL aapki wahi purani honi chahiye jo app.js me hai
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_leCWfb7HNhh4BLGLMqhM8dF9jCKpvmqIZkijnzEJl__E3dZftwl3z-hZ7mmzYtrHSA/exec";

    // Page load hote hi Name aur Phone auto-fill karein
    window.onload = function() {
        document.getElementById('docName').value = localStorage.getItem("bhavya_name") || "";
        document.getElementById('docPhone').value = localStorage.getItem("bhavya_mobile") || "";
    };

    function toggleOnlineFields() {
        var status = document.getElementById("onlineAvailable").value;
        document.getElementById("onlineFields").style.display = (status === "Yes") ? "block" : "none";
    }

    // Helper: File ko Base64 text me convert karne ke liye (Taki script tak bheji ja sake)
    function getBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]); 
            reader.onerror = error => reject(error);
        });
    }

    async function submitProfile() {
        const docId = localStorage.getItem("bhavya_user_id");
        if (!docId) { alert("Session expired! Please login again."); return; }

        const docRegFile = document.getElementById('regDocument').files[0];
        const docImgFile = document.getElementById('doctorImage').files[0];

        if(!docRegFile || !docImgFile || !document.getElementById('docSpeciality').value) {
            alert("Please fill all required fields and upload both files."); return;
        }

        document.getElementById('loader').style.display = "block";
        document.querySelector('.btn-submit').style.display = "none";

        try {
            // Convert files to Base64
            const regBase64 = await getBase64(docRegFile);
            const imgBase64 = await getBase64(docImgFile);

            const payload = {
                action: "submitDoctorProfile",
                doctor_id: docId,
                name: document.getElementById('docName').value,
                phone: document.getElementById('docPhone').value,
                speciality: document.getElementById('docSpeciality').value,
                clinic_address: document.getElementById('docAddress').value,
                offline_fee: document.getElementById('offlineFee').value,
                online_fee: document.getElementById('onlineFee').value || "0",
                upi_id: document.getElementById('upiId').value || "N/A",
                online_available: document.getElementById('onlineAvailable').value,
                reg_document_base64: regBase64,
                reg_document_mime: docRegFile.type,
                doctor_image_base64: imgBase64,
                doctor_image_mime: docImgFile.type
            };

            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (result.status === "success") {
                alert("Profile Submitted Successfully! Awaiting Admin Approval.");
                // Submit hone ke baad aap inhe dashboard par bhej sakte hain
                // window.location.href = "doctor_dashboard.html";
            } else {
                alert("Error: " + result.message);
            }
        } catch(e) {
            alert("Submission failed. Try again.");
            console.error(e);
        } finally {
            document.getElementById('loader').style.display = "none";
            document.querySelector('.btn-submit').style.display = "block";
        }
    }
</script>

</body>
</html>
