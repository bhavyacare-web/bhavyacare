<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Status - BhavyaCare</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 450px; }
        h1 { margin-bottom: 10px; }
        p { color: #555; font-size: 16px; line-height: 1.5; margin-bottom: 25px; }
        .btn { border: none; padding: 12px 25px; border-radius: 5px; font-size: 16px; cursor: pointer; text-decoration: none; display: inline-block; transition: 0.3s; font-weight: bold;}
        .btn-logout { background-color: #555; color: white; }
        .btn-logout:hover { background-color: #333; }
        .btn-edit { background-color: #28a745; color: white; margin-bottom: 10px; }
        .btn-edit:hover { background-color: #218838; }
        
        #rejectBox { display: none; background: #f8d7da; border: 1px solid #f5c6cb; padding: 15px; border-radius: 5px; color: #721c24; margin-bottom: 20px; font-size: 14px;}
    </style>
</head>
<body>

<div class="container">
    <h1 id="statusTitle">⏳ Approval Pending</h1>
    <p id="statusMessage">Aapki profile details BhavyaCare team ke paas aa chuki hain. Humara admin panel jald hi aapki details verify karke aapko Active kar dega.</p>
    
    <div id="rejectBox">
        <strong>Rejection Reason:</strong><br>
        <span id="rejectReasonText"></span>
    </div>

    <a href="doctor_registration.html" id="editBtn" class="btn btn-edit" style="display: none;">Fix Mistakes & Re-Submit</a><br>
    <a href="#" onclick="logoutUser()" class="btn btn-logout">Logout</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="../app.js"></script>
<script>
    window.onload = function() {
        const status = localStorage.getItem("bhavya_doc_status");
        const reason = localStorage.getItem("bhavya_doc_reject_reason");

        if (status === "Rejected") {
            document.getElementById("statusTitle").innerText = "❌ Profile Rejected";
            document.getElementById("statusTitle").style.color = "#dc3545";
            document.getElementById("statusMessage").innerText = "Aapki profile admin dwara reject kar di gayi hai. Niche diye gaye karan ko padhein aur apni profile theek karke dobara submit karein.";
            
            document.getElementById("rejectBox").style.display = "block";
            document.getElementById("rejectReasonText").innerText = reason || "Karan uplabdh nahi hai. Kripya admin se sampark karein.";
            
            document.getElementById("editBtn").style.display = "inline-block";
        } else {
            document.getElementById("statusTitle").style.color = "#f39c12";
        }
    };
</script>
</body>
</html>
