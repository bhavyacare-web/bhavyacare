<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bhavyacare.com - Home</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; }
        
        /* Main Body Content Styling */
        .hero-section { text-align: center; padding: 80px 20px; background-color: #e6f0fa; }
        .hero-section h1 { color: #0056b3; font-size: 36px; margin-bottom: 10px; }
        .hero-section p { color: #555; font-size: 18px; max-width: 600px; margin: 0 auto; }
        
        /* VIP Button Styling */
        .vip-cta-btn {
            background-color: #ffc107;
            color: #333;
            border: none;
            padding: 14px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
            transition: all 0.3s ease;
            margin-top: 25px;
            display: inline-block;
        }
        .vip-cta-btn i {
            margin-right: 8px;
            color: #d35400;
        }
        .vip-cta-btn:hover {
            background-color: #e0a800;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 193, 7, 0.6);
        }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <div class="hero-section">
        <h1>Welcome to BhavyaCare</h1>
        <p>Aapki health, humari zimmedari. Book tests, consult doctors, and get medicines easily.</p>
        
        <button class="vip-cta-btn" onclick="handleVipClick()">
            <i class="fas fa-crown"></i> Get VIP Family Plan
        </button>
    </div>

    <script>
        // Step 1: header.html ko fetch karke id="header-container" ke andar daalna
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
                
                // Step 2: Header load hone ke BAAD app.js load karna 
                let script = document.createElement('script');
                script.src = 'app.js';
                document.body.appendChild(script);
            })
            .catch(error => console.error('Error loading header:', error));

        // 🌟 NAYA LOGIC: Check Login Before Opening VIP Page 🌟
        function handleVipClick() {
            const userId = localStorage.getItem("bhavya_user_id");
            
            if (userId) {
                // Agar user login hai, toh seedha VIP page par bhejo
                window.location.href = 'patient_dashboard/vip_member.html';
            } else {
                // Agar login nahi hai, toh Login Form open karo
                alert("Please login or create an account first to get the VIP Plan!");
                
                if (typeof openPatientLogin === "function") {
                    openPatientLogin(); // Ye function tumhare app.js me already hai
                } else {
                    // Agar app.js thoda late load hua ho, toh directly button click karwa do
                    const loginBtn = document.getElementById('nav-login-btn');
                    if (loginBtn) loginBtn.click();
                }
            }
        }
    </script>

</body>
</html>
