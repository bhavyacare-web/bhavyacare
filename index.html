<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    // ✨ SESSION PROTECTION LOGIC ✨
    // Agar user pehle se logged in hai, toh use direct uske dashboard par bhej do
    document.addEventListener("DOMContentLoaded", () => {
        const userId = localStorage.getItem("bhavya_user_id");
        const role = localStorage.getItem("bhavya_role");

        // Agar dono details localStorage me hain, matlab user logged in hai
        if (userId && role) {
            // window.location.replace use kar rahe hain taaki "Back" button ki history me index.html save na ho
            if (role === "lab") {
                window.location.replace("labs/lab_dashboard.html"); // Apne lab folder ka sahi path dalein
            } 
            else if (role === "pharmacy") {
                window.location.replace("pharmacy/pharmacy_dashboard.html");
            } 
            else if (role === "patient") {
                window.location.replace("patient_dashboard/patient_dashboard.html");
            } 
            else if (role === "doctor") {
                window.location.replace("doctor/doctor_dashboard.html"); // Doctor ka sahi path dalein
            }
            else if (role === "admin") {
                window.location.replace("admin/admin_dashboard.html"); // Admin ka sahi path dalein
            }
        }
    });
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bhavyacare.com - Home</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; }
        .hero-section { text-align: center; padding: 100px 20px; background-color: #e6f0fa; }
        .hero-section h1 { color: #0056b3; font-size: 42px; margin-bottom: 15px; font-weight: 800; }
        .hero-section p { color: #555; font-size: 18px; max-width: 600px; margin: 0 auto 30px auto; line-height: 1.6; }
        
        .action-buttons { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        
        /* Button Styles for smooth hover effects */
        .btn-home {
            text-decoration: none; padding: 15px 35px; border-radius: 30px; font-size: 18px; 
            font-weight: bold; display: inline-flex; align-items: center; gap: 10px; color: white;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-lab { background: linear-gradient(135deg, #0056b3 0%, #007bff 100%); box-shadow: 0 6px 15px rgba(0, 86, 179, 0.3); }
        .btn-lab:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(0, 86, 179, 0.5); }
        
        /* 🌟 NAYA DOCTOR BUTTON STYLE 🌟 */
        .btn-doctor { background: linear-gradient(135deg, #20c997 0%, #17a2b8 100%); box-shadow: 0 6px 15px rgba(23, 162, 184, 0.3); }
        .btn-doctor:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(23, 162, 184, 0.5); }

        .btn-vip { background: linear-gradient(135deg, #ffb74d 0%, #f57c00 100%); box-shadow: 0 6px 15px rgba(245, 124, 0, 0.4); }
        .btn-vip:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(245, 124, 0, 0.6); }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <div class="hero-section">
        <h1>Welcome to BhavyaCare</h1>
        <p>Aapki health, humari zimmedari. Book tests, consult doctors, and get medicines easily right at your doorstep.</p>
        
        <div class="action-buttons">
            <a href="#" onclick="handleBookClick(event)" class="btn-home btn-lab">
                <i class="fas fa-microscope"></i> Book Lab Test
            </a>
            
            <a href="bookdoctor/bookdoctor.html" class="btn-home btn-doctor">
                <i class="fas fa-user-md"></i> Consult Doctor
            </a>
            
            <a href="#" onclick="handleVipClick(event)" class="btn-home btn-vip">
                <i class="fas fa-crown"></i> Upgrade to VIP
            </a>
        </div>
    </div>

    <script>
        // 1. Header aur App.js load karne ka logic
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
                let script = document.createElement('script');
                script.src = 'app.js';
                document.body.appendChild(script);
            })
            .catch(error => console.error('Error loading header:', error));

        // BOOKING LOGIC (BINA LOGIN KE DIRECT REDIRECT) 
        function handleBookClick(event) {
            event.preventDefault(); 
            // Seedha booking page par bhejo, koi login check nahi!
            window.location.href = "booking/booking.html";
        }

        // 2. VIP Button Logic: Isme login jaruri hai
        function handleVipClick(event) {
            event.preventDefault(); 
            
            const userId = localStorage.getItem("bhavya_user_id");
            
            if (userId) {
                // Agar user logged in hai, toh VIP page par bhejo
                window.location.href = "vip/vip_member.html";
            } else {
                // Agar user logged in nahi hai, toh login popup open karo
                if (typeof openPatientLogin === "function") {
                    openPatientLogin();
                } else {
                    alert("Please wait a second for the app to load fully.");
                }
            }
        }
    </script>
</body>
</html>
