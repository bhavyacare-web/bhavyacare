<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bhavyacare.com - Home</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; }
        .hero-section { text-align: center; padding: 100px 20px; background-color: #e6f0fa; }
        .hero-section h1 { color: #0056b3; font-size: 42px; margin-bottom: 15px; font-weight: 800; }
        .hero-section p { color: #555; font-size: 18px; max-width: 600px; margin: 0 auto 30px auto; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <div class="hero-section">
        <h1>Welcome to BhavyaCare</h1>
        <p>Aapki health, humari zimmedari. Book tests, consult doctors, and get medicines easily right at your doorstep.</p>
        
        <a href="vip/vip_member.html" style="background: linear-gradient(135deg, #ffb74d 0%, #f57c00 100%); color: white; text-decoration: none; padding: 15px 35px; border-radius: 30px; font-size: 18px; font-weight: bold; display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 6px 15px rgba(245, 124, 0, 0.4); transition: transform 0.2s ease, box-shadow 0.2s ease;" onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0 8px 20px rgba(245, 124, 0, 0.6)';" onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 6px 15px rgba(245, 124, 0, 0.4)';">
            <i class="fas fa-crown"></i> Upgrade to VIP Family Plan
        </a>
    </div>

    <script>
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
                let script = document.createElement('script');
                script.src = 'app.js';
                document.body.appendChild(script);
            })
            .catch(error => console.error('Error loading header:', error));
    </script>
</body>
</html>
