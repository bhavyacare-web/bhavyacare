<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bhavyacare.com - Home</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; }
        .hero-section { text-align: center; padding: 80px 20px; background-color: #e6f0fa; }
        .hero-section h1 { color: #0056b3; font-size: 36px; margin-bottom: 10px; }
        .hero-section p { color: #555; font-size: 18px; max-width: 600px; margin: 0 auto; }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <div class="hero-section">
        <h1>Welcome to BhavyaCare</h1>
        <p>Aapki health, humari zimmedari. Book tests, consult doctors, and get medicines easily.</p>
    </div>

    <script>
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
                let script = document.createElement('script');
                script.src = 'app.js';
                document.body.appendChild(script);
            })
            .catch(error => console.error('Error loading header:', error));
    </script>
</body>
</html>
