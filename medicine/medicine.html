<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Medicine - BhavyaCare</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; }
        
        .main-content { padding: 40px 20px; }
        .order-container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .order-container h2 { color: #0056b3; margin-bottom: 20px; text-align: center; font-size: 24px;}
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; font-size: 14px; }
        .input-box { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: #0056b3; box-shadow: 0 0 5px rgba(0,86,179,0.2); }
        
        .toggle-options { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-btn { flex: 1; padding: 12px; border: 1px solid #0056b3; background: white; color: #0056b3; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.3s; font-size: 15px;}
        .type-btn.active { background: #0056b3; color: white; }
        
        .action-btn { width: 100%; background: #28a745; color: white; border: none; padding: 15px; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .action-btn:hover { background: #218838; }
        .action-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        #error-msg { color: #dc3545; font-size: 13px; margin-top: 5px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="header-container"></div>

    <div class="main-content">
        <div class="order-container">
            <h2><i class="fas fa-pills"></i> Order Medicines</h2>
            
            <div class="toggle-options">
                <button class="type-btn active" onclick="toggleOrderType('Prescription', this)">Upload Prescription</button>
                <button class="type-btn" onclick="toggleOrderType('Manual', this)">Type Names manually</button>
            </div>

            <div id="prescription-sec" class="form-group">
                <label>Upload Prescription Photo (Max 3MB)</label>
                <input type="file" id="presFile" class="input-box" accept="image/*,application/pdf">
                <p id="error-msg">File size is too large! Please upload a file under 3MB.</p>
            </div>

            <div id="manual-sec" class="form-group" style="display: none;">
                <label>Medicine Details (Name & Quantity)</label>
                <textarea id="medDetails" class="input-box" rows="4" placeholder="e.g. Paracetamol 500mg - 10 tablets"></textarea>
            </div>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

            <div class="form-group">
                <label>Receive Mode</label>
                <select id="receiveMode" class="input-box" onchange="toggleAddress()">
                    <option value="Home Delivery">Home Delivery</option>
                    <option value="Pickup">Pickup from Pharmacy</option>
                </select>
            </div>

            <div class="form-group">
                <label>When do you need it? (Delivery Date)</label>
                <input type="date" id="deliveryDate" class="input-box">
            </div>

            <div id="address-sec" class="form-group">
                <label>Delivery Address</label>
                <textarea id="deliveryAddress" class="input-box" rows="3" placeholder="Enter your full address with landmark"></textarea>
            </div>

            <button id="submitBtn" class="action-btn" onclick="submitOrder()">Place Medicine Order</button>
        </div>
    </div>

    <script src="app.js"></script>

    <script>
        // --- 1. DYNAMICALLY LOAD HEADER ---
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-container').innerHTML = data;
            })
            .catch(error => console.error('Error loading header:', error));

        // --- 2. MEDICINE ORDER LOGIC ---
        
        // 🌟 BUG FIX: Naam change kar diya taaki app.js ke sath clash na ho!
        const MEDICINE_API_URL = "https://script.google.com/macros/s/AKfycbz_leCWfb7HNhh4BLGLMqhM8dF9jCKpvmqIZkijnzEJl__E3dZftwl3z-hZ7mmzYtrHSA/exec";
        
        let currentType = 'Prescription';

        // UI Toggles
        function toggleOrderType(type, btn) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            document.getElementById('prescription-sec').style.display = type === 'Prescription' ? 'block' : 'none';
            document.getElementById('manual-sec').style.display = type === 'Manual' ? 'block' : 'none';
        }

        function toggleAddress() {
            const mode = document.getElementById('receiveMode').value;
            document.getElementById('address-sec').style.display = mode === 'Home Delivery' ? 'block' : 'none';
        }

        // Base64 File Converter
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // Main Order Submission
        async function submitOrder() {
            // Check if user is logged in
            const userId = localStorage.getItem("bhavya_user_id");
            
            if (!userId) {
                alert("Please log in to your account to place a medicine order.");
                if(typeof openPatientLogin === "function") {
                    openPatientLogin(); 
                }
                return;
            }

            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = "none";
            
            let fileData = null;

            // --- VALIDATION: Prescription Mode ---
            if (currentType === 'Prescription') {
                const fileInput = document.getElementById('presFile');
                if (fileInput.files.length === 0) {
                    alert("Please select a prescription image to upload.");
                    return;
                }

                const file = fileInput.files[0];
                const maxSize = 3 * 1024 * 1024; // 3 MB Limit

                if (file.size > maxSize) {
                    errorMsg.style.display = "block";
                    return;
                }

                btn.innerText = "Uploading & Processing...";
                btn.disabled = true;

                try {
                    const base64String = await getBase64(file);
                    const base64Data = base64String.split(',')[1]; 

                    fileData = {
                        base64: base64Data,
                        filename: userId + "_Prescription_" + file.name, 
                        mimeType: file.type
                    };
                } catch (err) {
                    alert("Error processing the file. Please try again.");
                    btn.innerText = "Place Medicine Order";
                    btn.disabled = false;
                    return;
                }
            } 
            // --- VALIDATION: Manual Mode ---
            else {
                const details = document.getElementById('medDetails').value.trim();
                if (details === "") {
                    alert("Please provide the medicine details and quantities.");
                    return;
                }
                btn.innerText = "Processing Your Order...";
                btn.disabled = true;
            }

            // --- PREPARE DATA TO SEND ---
            const payload = {
                action: "orderMedicine",
                user_id: userId,
                order_type: currentType,
                medicine_details: document.getElementById('medDetails').value,
                fileData: fileData, 
                receive_medicine: document.getElementById('receiveMode').value,
                delivery_date: document.getElementById('deliveryDate').value,
                address: document.getElementById('deliveryAddress').value
            };

            // --- SEND TO BACKEND (Yahan MEDICINE_API_URL use kiya hai) ---
            fetch(MEDICINE_API_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    alert("Your medicine order has been successfully placed! Order ID: " + data.order_id);
                    window.location.reload(); 
                } else {
                    alert("Server Error: " + data.message);
                    btn.innerText = "Place Medicine Order";
                    btn.disabled = false;
                }
            })
            .catch(err => {
                console.error("Fetch Error: ", err);
                alert("A network error occurred. Please check your connection and try again later.");
                btn.innerText = "Place Medicine Order";
                btn.disabled = false;
            });
        }
    </script>

</body>
</html>
