<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Dashboard - BhavyaCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --secondary: #10b981; --bg-color: #f3f6f9; --text-dark: #0f172a; --text-muted: #64748b; --card-bg: #ffffff; }
        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-color); margin: 0; padding-bottom: 50px; color: var(--text-dark);}
        
        .navbar { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 15px 5%; box-shadow: 0 4px 20px rgba(0,0,0,0.03); position: sticky; top: 0; z-index: 100;}
        .logo h2 { color: var(--primary); margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.5px;}
        .logo span { color: var(--secondary); }
        .btn-logout { background: #fee2e2; color: #dc2626; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s;}
        
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .dashboard-header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end;}
        .dashboard-header h1 { margin: 0; font-size: 28px; font-weight: 800;}
        
        /* Tabs */
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; overflow-x: auto; white-space: nowrap;}
        .nav-btn { padding: 10px 20px; border-radius: 20px; border: 1px solid transparent; background: transparent; cursor: pointer; font-weight: 700; color: var(--text-muted); font-size: 15px; transition: 0.3s;}
        .nav-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);}
        .nav-btn:hover:not(.active) { background: #f1f5f9; color: var(--text-dark);}
        
        .tab-section { display: none; }
        .tab-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Filters */
        .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; background: #ffffff; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; align-items: center; flex-wrap: wrap;}
        .search-wrapper { flex: 2; position: relative; min-width: 250px;}
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 15px;}
        .filter-input { width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none;}
        .filter-input.with-icon { padding-left: 42px; }
        .filter-actions { display: flex; gap: 10px; flex: 3; align-items: center; min-width: 300px;}
        .filter-btn { background: #eff6ff; color: var(--primary); border: 1px solid #bfdbfe; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 6px;}

        /* Order Cards */
        .order-card { background: var(--card-bg); border-radius: 16px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.04); margin-bottom: 20px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 15px;}
        .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px;}
        .order-id { font-weight: 800; color: var(--primary); font-size: 18px;}
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;}
        .badge-pending { background: #fef3c7; color: #d97706; }
        
        .order-body { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .info-block h4 { margin: 0 0 5px 0; font-size: 13px; color: var(--text-muted); text-transform: uppercase;}
        .info-block p { margin: 0; font-weight: 600; font-size: 15px; color: var(--text-dark);}
        
        .order-actions { display: flex; gap: 15px; margin-top: 10px; border-top: 1px solid #f1f5f9; padding-top: 20px;}
        .btn { padding: 12px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; text-align: center; display: inline-flex; justify-content: center; align-items: center; gap: 8px;}
        .btn-call { background: #e0e7ff; color: #4f46e5; flex: 1;}
        .btn-process { background: var(--secondary); color: white; flex: 2;}

        /* Settlement Specific */
        .settlement-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 15px;}
        .settlement-box { background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 13px;}

        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000;}
        .modal { background: white; width: 90%; max-width: 600px; border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-height: 90vh; overflow-y: auto;}
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer;}
        
        .form-group { margin-bottom: 15px; }
        label { font-weight: 700; display: block; margin-bottom: 8px; font-size: 13px;}
        textarea, input, select { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; outline: none;}
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* ✨ PROFILE SPECIFIC CSS ✨ */
        .tags-wrapper { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;}
        .tag { background: #e0f2fe; color: #0369a1; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; border: 1px solid #bae6fd;}
        .tag span { cursor: pointer; color: #0284c7; font-weight: 800; font-size: 16px;}
        .timing-row { display: grid; grid-template-columns: 100px 1fr 1fr; align-items: center; gap: 15px; margin-bottom: 10px; background:#f8fafc; padding:10px; border-radius:8px;}

        @keyframes shake { 0% { transform: rotate(0); } 25% { transform: rotate(10deg); } 50% { transform: rotate(-10deg); } 75% { transform: rotate(10deg); } 100% { transform: rotate(0); } }

        @media (max-width: 768px) {
            .dashboard-header { flex-direction: column; align-items: flex-start;}
            .filter-actions { flex-wrap: wrap; }
            .order-body { grid-template-columns: 1fr; }
            .order-actions { flex-direction: column; }
            .timing-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo"><h2>Bhavya<span>Care</span></h2></div>
        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </header>

    <div class="container">
        <div class="dashboard-header">
            <div>
                <h1>Pharmacy Dashboard</h1>
                <p>Welcome, <span id="pharmaNameStr" style="font-weight: 700; color: #2563eb;"></span></p>
            </div>
            <button class="btn" style="background: white; border: 1px solid #cbd5e1; color: #475569;" onclick="fetchOrders()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>

        <div class="nav-tabs">
            <button class="nav-btn active" onclick="showSection('ordersSection', this)"><i class="fas fa-box-open"></i> Live Orders</button>
            <button class="nav-btn" onclick="showSection('settlementsSection', this)"><i class="fas fa-file-invoice-dollar"></i> Settlement Report</button>
            <button class="nav-btn" onclick="showSection('profileSection', this)"><i class="fas fa-store"></i> Edit Profile</button>
        </div>

        <div id="ordersSection" class="tab-section active">
            <div class="filter-bar">
                <div class="search-wrapper">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchOrderInput" class="filter-input with-icon" placeholder="Search Order ID, Patient Name or Mobile..." onkeyup="filterLiveOrders()">
                </div>
                <div class="filter-actions">
                    <select id="statusFilter" class="filter-input" style="flex:1;" onchange="filterLiveOrders()">
                        <option value="All">All Statuses</option>
                        <option value="Pending">New / Pending</option>
                        <option value="confirm_for_patient">Sent to Patient</option>
                        <option value="Confirmed">Confirmed (Action Needed)</option>
                        <option value="Completed">Completed</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                    <input type="date" id="dateFilter" class="filter-input date-input" onchange="filterLiveOrders()">
                    <button class="filter-btn" onclick="clearOrderFilters()"><i class="fas fa-times"></i> Clear</button>
                </div>
            </div>

            <div id="ordersContainer">
                <div style="text-align: center; padding: 50px; color: #64748b;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 30px; margin-bottom: 10px;"></i>
                    <p>Loading your orders...</p>
                </div>
            </div>
        </div>

        <div id="settlementsSection" class="tab-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0; color: #0f172a;"><i class="fas fa-check-circle" style="color: #10b981;"></i> Completed Orders Ledger</h3>
                <button class="btn" style="background: #ef4444; color: white;" onclick="downloadSettlementPDF()">
                    <i class="fas fa-file-pdf"></i> Export PDF
                </button>
            </div>
            
            <div class="filter-bar" style="background: #f8fafc;">
                <div class="search-wrapper" style="flex: 1;">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchSettlementInput" class="filter-input with-icon" placeholder="Search Order ID..." onkeyup="filterSettlements()">
                </div>
                <div class="filter-actions" style="flex: 2;">
                    <label style="margin: auto 5px; font-size: 13px; font-weight: bold; color: #64748b;">From:</label>
                    <input type="date" id="settlementStartDate" class="filter-input date-input" onchange="filterSettlements()">
                    <label style="margin: auto 5px; font-size: 13px; font-weight: bold; color: #64748b;">To:</label>
                    <input type="date" id="settlementEndDate" class="filter-input date-input" onchange="filterSettlements()">
                    <button class="filter-btn" onclick="clearSettlementFilters()"><i class="fas fa-times"></i> Clear</button>
                </div>
            </div>

            <div id="settlementList"></div>
        </div>

        <div id="profileSection" class="tab-section">
            <div class="order-card" style="border-top: 4px solid var(--primary);">
                <h3 style="margin-top:0;">Update Pharmacy Details</h3>
                <form id="profileUpdateForm">
                    
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Delivery Pincodes</label>
                            <div style="display:flex; gap:10px;">
                                <input type="number" id="profPincode" class="filter-input" placeholder="Type pincode">
                                <button type="button" class="btn btn-process" style="width:auto;" onclick="addProfTag('pincode')">+</button>
                            </div>
                            <div id="profPincodeTags" class="tags-wrapper"></div>
                        </div>
                        <div class="form-group">
                            <label>Delivery Cities / Localities</label>
                            <div style="display:flex; gap:10px;">
                                <input type="text" id="profCity" class="filter-input" placeholder="Type city">
                                <button type="button" class="btn btn-process" style="width:auto;" onclick="addProfTag('city')">+</button>
                            </div>
                            <div id="profCityTags" class="tags-wrapper"></div>
                        </div>
                    </div>

                    <h4 style="border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; margin-top:20px;">Working Timings</h4>
                    <div id="profTimingsContainer"></div>

                    <h4 style="border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; margin-top:20px;">Store Images</h4>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Update Image 1 (Optional)</label>
                            <input type="file" id="profImg1" class="filter-input" accept="image/*">
                            <p id="currImg1" style="font-size:12px; color:var(--primary); margin-top:5px;"></p>
                        </div>
                        <div class="form-group">
                            <label>Update Image 2 (Optional)</label>
                            <input type="file" id="profImg2" class="filter-input" accept="image/*">
                            <p id="currImg2" style="font-size:12px; color:var(--primary); margin-top:5px;"></p>
                        </div>
                    </div>

                    <button type="submit" class="btn" id="btnUpdateProfile" style="width:100%; background:var(--primary); color:white; margin-top:20px; font-size:16px;">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                </form>
            </div>
        </div>

    </div>

    <div class="modal-overlay" id="processModal">
        <div class="modal">
            <div class="modal-header"><h3>Process Order <span id="modalOrderId" style="color:#2563eb;"></span></h3><button class="close-btn" onclick="closeModal()">&times;</button></div>
            <form id="processForm">
                <input type="hidden" id="processOrderId">
                <div class="form-group"><label>Available Medicines & Delivery Time *</label><textarea id="availMeds" rows="3" required></textarea></div>
                <div class="form-group"><label>Not Available Medicines (If any)</label><textarea id="notAvailMeds" rows="2"></textarea></div>
                <div class="form-group"><label>Is Prescription Required for these medicines? *</label>
                    <select id="prescReq" required><option value="No">No, Not Required</option><option value="Yes">Yes, Mandatory</option></select>
                </div>
                <div style="background:#f8fafc; padding:15px; border-radius:10px; border:1px solid #e2e8f0; margin-bottom:15px;">
                    <div class="grid-2">
                        <div class="form-group" style="margin-bottom:0;"><label>Total MRP (₹) *</label><input type="number" id="totalMRP" required></div>
                        <div class="form-group" style="margin-bottom:0;"><label>Purchase Rate (₹) *</label><input type="number" id="purchaseRate" required></div>
                    </div>
                </div>
                <button type="submit" class="btn btn-process" id="btnSubmitForm" style="width:100%;">Send to Patient</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="cancelOrderModal">
        <div class="modal">
            <div class="modal-header"><h3>Cancel Order <span id="cancelModalOrderId" style="color:#dc2626;"></span></h3><button class="close-btn" onclick="closeCancelModal()">&times;</button></div>
            <form id="cancelOrderForm">
                <input type="hidden" id="cancelOrderIdHidden">
                <div class="form-group"><label>Reason for Cancellation *</label><textarea id="cancelReasonText" rows="3" required style="border-color:#fca5a5;"></textarea></div>
                <button type="submit" class="btn" id="btnSubmitCancel" style="background:#dc2626; color:white; width:100%; margin-top:10px;">Confirm Cancellation</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="reminderAlertModal" style="z-index:9999;">
        <div class="modal" style="text-align:center; border:3px solid #f59e0b;">
            <div style="background:#fef3c7; width:70px; height:70px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 15px auto;"><i class="fas fa-bell" style="font-size:35px; color:#d97706; animation:shake 1s infinite;"></i></div>
            <h2 style="margin:0 0 10px 0; color:#d97706;">Delivery Reminder!</h2>
            <p id="reminderAlertMessage" style="font-size:15px; color:#475569; margin-bottom:20px; line-height:1.5;"></p>
            <button class="btn" onclick="document.getElementById('reminderAlertModal').style.display='none'" style="width:100%; background:#d97706; color:white;">Got it, I will check</button>
        </div>
    </div>
<div class="modal-overlay" id="completeOrderModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Complete Order <span id="completeModalOrderId" style="color:#10b981;"></span></h3>
                <button class="close-btn" onclick="closeCompleteModal()">&times;</button>
            </div>
            <form id="completeOrderForm">
                <input type="hidden" id="completeOrderIdHidden">
                <p style="font-size:13px; color:#64748b; margin-bottom: 15px;">
                    Please upload the final medicine bill (Invoice) before marking this order as delivered.
                </p>
                <div class="form-group">
                    <label>Upload Medicine Bill (PDF/Image) *</label>
                    <input type="file" id="medicineBillFile" accept=".pdf,image/*" required style="border: 2px dashed #10b981; background: #f0fdf4;">
                </div>
                <button type="submit" class="btn" id="btnSubmitComplete" style="background:#10b981; color:white; width:100%; margin-top:10px;">
                    <i class="fas fa-check-double"></i> Upload Bill & Mark Delivered
                </button>
            </form>
        </div>
    </div>
    
    <script src="pharmacy_dashboard.js"></script>
</body>
</html>
