<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Registration - BhavyaCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* === CSS DESIGN === */
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); padding: 30px 15px; color: #0f172a; margin: 0; min-height: 100vh;}
        
        .form-container { background: white; max-width: 950px; margin: auto; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; display: none; }
        
        .status-screen { max-width: 600px; width: 90%; margin: 10vh auto; background: white; padding: 50px 30px; border-radius: 16px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; display: none;}
        .status-screen i { font-size: 60px; margin-bottom: 20px; }
        .status-screen h2 { color: #0f172a; margin-bottom: 15px; font-size: 24px; margin-top:0;}
        .status-screen p { color: #64748b; font-size: 16px; line-height: 1.6;}

        h1 { text-align: center; color: #0f172a; margin-top: 0; font-size: 32px; font-weight: 800; letter-spacing: -0.5px;}
        p.subtitle { text-align: center; color: #64748b; margin-bottom: 40px; font-size: 15px; line-height: 1.5;}
        
        h2 { color: #0f172a; font-size: 18px; margin-top: 45px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #f1f5f9; display: flex; align-items: center; gap: 12px; line-height: 1.4;}
        h2 span.step { background: #059669; color: white; border-radius: 50%; width: 28px; height: 28px; display: inline-flex; justify-content: center; align-items: center; font-size: 14px; font-weight: bold; flex-shrink: 0;}
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .form-group { margin-bottom: 20px; width: 100%;}
        
        label { font-weight: 600; display: block; margin-bottom: 8px; font-size: 14px; color: #334155;}
        input[type="text"], input[type="email"], input[type="time"], input[type="file"], input[type="number"], select { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 15px; transition: all 0.3s ease; background: #f8fafc;}
        input[type="file"] { padding: 10px; font-size: 14px; background: white;}
        input:focus, select:focus { border-color: #059669; background: white; outline: none; box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1); }
        
        .timing-row { display: grid; grid-template-columns: 130px 1fr 1fr; align-items: center; gap: 20px; background: #f8fafc; padding: 12px 20px; border-radius: 10px; margin-bottom: 12px; border: 1px solid #e2e8f0; transition: 0.2s;}
        .timing-day { font-weight: 600; color: #0f172a; font-size: 15px; }

        button.submit-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #059669 0%, #047857 100%); color: white; border: none; font-size: 18px; font-weight: 700; border-radius: 10px; cursor: pointer; margin-top: 40px; transition: 0.3s; box-shadow: 0 4px 15px rgba(5, 150, 105, 0.3); min-height: 56px;}
        button.submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(5, 150, 105, 0.4); }
        button.submit-btn:disabled { background: #94a3b8; cursor: not-allowed; }
        
        .input-with-button { display: flex; gap: 10px; margin-bottom: 10px; align-items: stretch; flex-wrap: wrap;}
        .input-with-button input { flex: 1; margin: 0; min-width: 130px; background: white;}
        .add-btn { background: #2563eb; color: white; border: none; border-radius: 8px; padding: 0 18px; height: 48px; font-size: 22px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center;}
        
        .ai-controls { display: flex; gap: 10px; flex: 1; min-width: 250px;}
        .ai-controls select { width: 90px; height: 48px; background: white; margin: 0;}
        .ai-btn { flex: 1; background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); color: white; border: none; border-radius: 8px; height: 48px; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;}
        
        .tags-wrapper { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; min-height: 20px;}
        .tag { background: #e0f2fe; color: #0369a1; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; border: 1px solid #bae6fd;}
        .tag span { cursor: pointer; color: #0284c7; font-weight: 800; font-size: 16px;}

        @media (max-width: 768px) {
            .grid-2, .grid-3, .timing-row { grid-template-columns: 1fr; gap: 10px; }
            .timing-row { position: relative; padding: 15px;}
            .timing-day { border-bottom: 1px solid #e2e8f0; padding-bottom: 8px; margin-bottom: 5px; color: #059669; }
            .input-with-button { flex-direction: column; gap: 12px; }
        }
    </style>
</head>
<body>

<div id="statusChecker" class="status-screen">
    <i class="fas fa-spinner fa-spin" style="color: #3b82f6;"></i>
    <h2>Checking Account Status...</h2>
    <p>Please wait while we verify your details securely.</p>
</div>

<div class="form-container" id="mainFormContainer">
    <h1>Complete Your Pharmacy Profile</h1>
    <p class="subtitle">Join BhavyaCare's network of trusted medicine delivery partners.</p>

    <form id="pharmacyRegForm">
        <h2><span class="step">1</span> Basic Details</h2>
        <div class="grid-2">
            <div class="form-group"><label>Pharmacy Name *</label><input type="text" id="pharmacy_name" readonly></div>
            <div class="form-group"><label>Email Address *</label><input type="email" id="email" required></div>
        </div>
        
        <div class="grid-2">
            <div class="form-group"><label>Registration Document 1 (Required) *</label><input type="file" id="doc1" accept=".pdf" required></div>
            <div class="form-group"><label>Registration Document 2 (Optional)</label><input type="file" id="doc2" accept=".pdf"></div>
        </div>

        <div class="form-group"><label>Full Address *</label><input type="text" id="address" required></div>
        <div class="grid-2">
            <div class="form-group"><label>City *</label><input type="text" id="city" required></div>
            <div class="form-group"><label>Main Pincode *</label><input type="number" id="pincode" required></div>
        </div>

        <h2><span class="step">2</span> Home Delivery Areas</h2>
        
        <div class="form-group tag-input-container">
            <label>Available Pincodes * <span style="font-weight:normal; font-size:12px; color:#64748b;">(Type and press +)</span></label>
            <div class="input-with-button">
                <div style="display: flex; gap: 10px; flex: 1;">
                    <input type="number" id="pincodeInput" placeholder="Add pincode manually">
                    <button type="button" class="add-btn" onclick="addTag('pincode')" title="Add Pincode">+</button>
                </div>
                
                <div class="ai-controls">
                    <select id="radiusSelect">
                        <option value="5">5 km</option>
                        <option value="10">10 km</option>
                        <option value="20" selected>20 km</option>
                        <option value="30">30 km</option>
                    </select>
                    <button type="button" class="ai-btn" onclick="aiAutoFillPincodes()"><i class="fas fa-magic"></i> Auto-Fill Area</button>
                </div>
            </div>
            <div id="pincodeTags" class="tags-wrapper"></div>
        </div>

        <div class="form-group tag-input-container">
            <label>Available Cities/Localities * <span style="font-weight:normal; font-size:12px; color:#64748b;">(Type and press +)</span></label>
            <div class="input-with-button">
                <div style="display: flex; gap: 10px; flex: 1; width: 100%;">
                    <input type="text" id="cityInput" placeholder="Add city manually">
                    <button type="button" class="add-btn" onclick="addTag('city')" title="Add City">+</button>
                </div>
            </div>
            <div id="cityTags" class="tags-wrapper"></div>
        </div>

        <h2><span class="step">3</span> Working Timings <span style="font-size: 13px; font-weight: normal; color: #64748b;">(Fill at least 1 day)</span></h2>
        <div id="timingsContainer"></div>

        <h2><span class="step">4</span> Pharmacy Store Images</h2>
        <div class="grid-2">
            <div class="form-group"><label>Store Image 1 (Required) *</label><input type="file" id="img1" accept="image/*" required></div>
            <div class="form-group"><label>Store Image 2 (Optional)</label><input type="file" id="img2" accept="image/*"></div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Submit Profile for Verification</button>
    </form>
</div>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA0YBo69ZZ-5HxWOSC-6W06jsk9I9_N4Ds&libraries=places&v=weekly"></script>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_leCWfb7HNhh4BLGLMqhM8dF9jCKpvmqIZkijnzEJl__E3dZftwl3z-hZ7mmzYtrHSA/exec";
    const days = ["monday", "tuesday", "wednesday", "thursday", "friday", "saturday", "sunday"];
    let pincodeList = []; let cityList = [];

    document.addEventListener("DOMContentLoaded", () => {
        const pName = localStorage.getItem("bhavya_name");
        const userId = localStorage.getItem("bhavya_user_id");
        
        if (!userId || localStorage.getItem("bhavya_role") !== "pharmacy") {
            alert("Unauthorized Access!"); window.location.href = "../index.html"; return;
        }

        document.getElementById("statusChecker").style.display = "block";
        document.getElementById("mainFormContainer").style.display = "none";

        // ==========================================
        // ✨ STATUS CHECK & REDIRECT FIX ✨
        // ==========================================
        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST', body: JSON.stringify({ action: "checkPharmacyStatus", user_id: userId })
        })
        .then(res => res.json())
        .then(resData => {
            const statusBox = document.getElementById("statusChecker");
            
            // Backend resData.data ke andar status bhejta hai
            let pharmaStatus = "NOT_FOUND";
            if (resData.data && resData.data.status) {
                pharmaStatus = resData.data.status;
            }

            if (pharmaStatus === "ACTIVE") {
                // Sidha dashboard par
                window.location.href = "pharmacy_dashboard.html"; 
            } 
            else if (pharmaStatus === "INACTIVE" || pharmaStatus === "PENDING" || pharmaStatus === "REJECTED") {
                // Warning msg in Hindi/English mix
                statusBox.innerHTML = `
                    <i class="fas fa-clock" style="color: #f59e0b; font-size: 55px;"></i>
                    <h2 style="margin-top:20px;">Application Under Process</h2>
                    <p style="margin-top:10px; font-size: 16px; font-weight: 600; color: #dc2626;">
                        Aapki request abhi process me hai, kripya kuch samay baad try karein.
                    </p>`;
            } 
            else {
                // Naya User (Form dikhao)
                statusBox.style.display = "none";
                document.getElementById("mainFormContainer").style.display = "block";
                document.getElementById("pharmacy_name").value = pName;

                const timeDiv = document.getElementById("timingsContainer");
                days.forEach(day => {
                    let dayName = day.charAt(0).toUpperCase() + day.slice(1);
                    timeDiv.innerHTML += `
                    <div class="timing-row">
                        <div class="timing-day">${dayName}</div>
                        <div><input type="time" id="${day}_open" title="Opening Time"></div>
                        <div><input type="time" id="${day}_close" title="Closing Time"></div>
                    </div>`;
                });
            }
        }).catch(err => { 
            console.error(err); 
            document.getElementById("statusChecker").style.display = "none"; 
            document.getElementById("mainFormContainer").style.display = "block"; 
        });

        document.getElementById("pincodeInput").addEventListener("keypress", e => { if (e.key === "Enter") { e.preventDefault(); addTag('pincode'); } });
        document.getElementById("cityInput").addEventListener("keypress", e => { if (e.key === "Enter") { e.preventDefault(); addTag('city'); } });
        document.getElementById("pharmacyRegForm").addEventListener("submit", handleFormSubmit);
    });

    // --- TAG SYSTEM ---
    function addTag(type, aiValue = null) {
        let inputElem = document.getElementById(type + "Input"); let val = aiValue ? aiValue : inputElem.value.trim();
        if (!val) return;
        if (type === 'pincode' && !pincodeList.includes(val)) { pincodeList.push(val); updateTagsUI('pincode'); } 
        else if (type === 'city') {
            val = val.charAt(0).toUpperCase() + val.slice(1).toLowerCase();
            if (!cityList.map(c => c.toLowerCase()).includes(val.toLowerCase())) { cityList.push(val); updateTagsUI('city'); }
        }
        if(!aiValue) inputElem.value = ""; 
    }
    function removeTag(type, index) { type === 'pincode' ? pincodeList.splice(index, 1) : cityList.splice(index, 1); updateTagsUI(type); }
    function updateTagsUI(type) {
        let wrapper = document.getElementById(type + "Tags"); let list = type === 'pincode' ? pincodeList : cityList; wrapper.innerHTML = "";
        list.forEach((item, index) => { wrapper.innerHTML += `<div class="tag">${item} <span onclick="removeTag('${type}', ${index})">×</span></div>`; });
    }

    // ==========================================
    // ✨ ROBUST AUTO-FILL AI LOGIC (INDIAN POSTAL API) ✨
    // ==========================================
    async function aiAutoFillPincodes() {
        const basePincode = document.getElementById("pincode").value.trim(); 
        const city = document.getElementById("city").value.trim();
        const radiusKm = parseInt(document.getElementById("radiusSelect").value);
        
        if (!basePincode || !city) { 
            alert("Please enter both 'City' and 'Main Pincode' in Basic Details first."); 
            return; 
        }

        const btn = document.querySelector(".ai-btn"); 
        btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Scanning Area..."; 
        btn.disabled = true;
        
        pincodeList = []; cityList = [];
        updateTagsUI('pincode'); updateTagsUI('city');

        try {
            // Main Pincode aur City sabse pehle add karein
            addTag('pincode', basePincode);
            addTag('city', city);

            // 1. Fetching associated villages/areas for the main Pincode
            let pinRes = await fetch(`https://api.postalpincode.in/pincode/${basePincode}`);
            let pinData = await pinRes.json();
            
            if(pinData[0] && pinData[0].Status === "Success") {
                pinData[0].PostOffice.forEach(po => {
                    if (po.Name.toLowerCase() !== city.toLowerCase() && po.Name.toLowerCase() !== "india") {
                        addTag('city', po.Name);
                    }
                });
            }

            // 2. Fetching related Pincodes for the selected City 
            // Distance limit ko array slice se mimic karenge taaki bahut zyada door ka data na aaye
            let cityRes = await fetch(`https://api.postalpincode.in/postoffice/${city}`);
            let cityData = await cityRes.json();
            
            if(cityData[0] && cityData[0].Status === "Success") {
                let limit = radiusKm; // Using radius as a limit for number of surrounding areas
                let count = 0;
                
                cityData[0].PostOffice.forEach(po => {
                    if (count < limit) {
                        if (!pincodeList.includes(po.Pincode)) {
                            addTag('pincode', po.Pincode);
                            count++;
                        }
                        if (po.Name.toLowerCase() !== city.toLowerCase() && po.Name.toLowerCase() !== "india") {
                            addTag('city', po.Name);
                        }
                    }
                });
            }

            btn.innerHTML = "<i class='fas fa-magic'></i> Auto-Fill Area"; 
            btn.disabled = false;
        } catch (e) { 
            console.error(e);
            alert("Network error, could not fetch surrounding areas automatically.");
            btn.innerHTML = "<i class='fas fa-magic'></i> Auto-Fill Area"; 
            btn.disabled = false; 
        }
    }

    // --- FORM SUBMIT ---
    function getBase64(fileId) {
        return new Promise((resolve) => {
            const input = document.getElementById(fileId);
            if (!input || !input.files || input.files.length === 0) { resolve(""); return; }
            const reader = new FileReader(); reader.readAsDataURL(input.files[0]);
            reader.onload = () => resolve(reader.result.split(',')[1]);
        });
    }

    async function handleFormSubmit(e) {
        e.preventDefault();
        if(pincodeList.length === 0 || cityList.length === 0) { alert("Add at least 1 Available Pincode and City."); return; }

        let hasTime = false;
        days.forEach(day => { if (document.getElementById(day + "_open").value && document.getElementById(day + "_close").value) hasTime = true; });
        if (!hasTime) { alert("Provide timings for at least 1 day."); return; }

        const btn = document.getElementById("submitBtn"); btn.innerText = "Saving Profile & Sending Email... Please wait"; btn.disabled = true;

        try {
            let payload = {
                action: "submitPharmacyProfile",
                user_id: localStorage.getItem("bhavya_user_id"),
                pharmacy_name: document.getElementById("pharmacy_name").value,
                email: document.getElementById("email").value,
                address: document.getElementById("address").value,
                city: document.getElementById("city").value,
                pincode: document.getElementById("pincode").value,
                available_city: cityList.join(', '),
                available_pincode: JSON.stringify(pincodeList),
                doc1: await getBase64("doc1"),
                doc2: await getBase64("doc2"),
                img1: await getBase64("img1"),
                img2: await getBase64("img2")
            };

            days.forEach(day => {
                payload[day + "_opening_time"] = document.getElementById(day + "_open").value;
                payload[day + "_closing_time"] = document.getElementById(day + "_close").value;
            });

            const response = await fetch(GOOGLE_SCRIPT_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) });
            const resData = await response.json();

            if (resData.status === "success") {
                alert("Profile submitted successfully!");
                window.location.reload(); 
            } else {
                alert("Alert: " + resData.message); 
                btn.innerText = "Submit Profile for Verification"; 
                btn.disabled = false;
                if (resData.message.includes("process me hai")) {
                    window.location.reload(); 
                }
            }
        } catch (error) { alert("Network error. Try small size images."); btn.innerText = "Submit Profile for Verification"; btn.disabled = false; }
    }
</script>
</body>
</html>
