<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - BhavyaCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --secondary: #10b981; --bg-color: #f3f6f9; --text-dark: #0f172a; --text-muted: #64748b; }
        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-color); margin: 0; padding-bottom: 50px; color: var(--text-dark);}
        
        .navbar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 5%; box-shadow: 0 4px 20px rgba(0,0,0,0.03); position: sticky; top: 0; z-index: 100;}
        .logo h2 { color: var(--primary); margin: 0; font-size: 24px; font-weight: 800;}
        .logo span { color: var(--secondary); }
        .btn-back { background: #eff6ff; color: var(--primary); border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        
        .order-card { background: white; border-radius: 16px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.04); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 15px;}
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;}
        .badge-pending { background: #fef3c7; color: #d97706; }
        .badge-action { background: #e0e7ff; color: #4f46e5; }
        .badge-success { background: #d1fae5; color: #059669; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .info-box { background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 15px;}
        .info-box h4 { margin: 0 0 8px 0; font-size: 13px; color: var(--text-muted); text-transform: uppercase;}
        .info-box p { margin: 0; font-weight: 600; font-size: 15px; }

        .bill-box { background: #f0fdf4; border: 1px solid #10b981; padding: 15px; border-radius: 10px; text-align: center;}
        
        .btn { padding: 14px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .btn-confirm { background: var(--secondary); color: white; }
        .btn-call { background: #eff6ff; color: var(--primary); }

        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000;}
        .modal { background: white; width: 90%; max-width: 500px; border-radius: 20px; padding: 30px;}
        .modal-header h3 { margin: 0 0 15px 0;}
        .form-group { margin-bottom: 20px;}
        .form-group label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 14px;}
        .form-group input[type="file"] { width: 100%; padding: 15px; border: 2px dashed #cbd5e1; border-radius: 10px; background: #f8fafc;}
        
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo"><h2>Bhavya<span>Care</span></h2></div>
        <button class="btn-back" onclick="window.history.back()"><i class="fas fa-arrow-left"></i> Back</button>
    </header>

    <div class="container">
        <h2 style="margin-bottom: 25px;">My Medical Orders</h2>
        
        <div id="ordersContainer">
            <div style="text-align: center; padding: 50px; color: #64748b;">
                <i class="fas fa-spinner fa-spin" style="font-size: 30px; margin-bottom: 10px;"></i>
                <p>Loading your orders...</p>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Confirm Your Order</h3>
                <p id="prescAlert" style="color: #dc2626; font-size: 14px; font-weight: 600; display: none; background: #fee2e2; padding: 10px; border-radius: 8px;">
                    <i class="fas fa-exclamation-triangle"></i> Pharmacy requires a valid prescription for these medicines.
                </p>
            </div>
            
            <form id="confirmForm">
                <input type="hidden" id="modalOrderId">
                
                <div class="form-group" id="prescUploadGroup" style="display: none; margin-top: 15px;">
                    <label>Upload Valid Prescription (PDF/Image) *</label>
                    <input type="file" id="validPrescriptionFile" accept=".pdf,image/*">
                </div>
                
                <div style="display: flex; gap: 15px; margin-top: 25px;">
                    <button type="button" class="btn" style="background: #f1f5f9; color: var(--text-dark);" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-confirm" id="btnSubmitConfirm">Confirm & Place Order</button>
                </div>
            </form>
        </div>
    </div>

    <script src="ppdashboard.js"></script>
</body>
</html>
