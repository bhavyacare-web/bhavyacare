<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Withdrawal Approvals | Bhavya Care</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0; padding: 20px;
        }
        .header {
            background: #fff; padding: 20px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;
        }
        h2 { margin: 0; color: #333; }
        table {
            width: 100%; border-collapse: collapse; background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden;
        }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007bff; color: white; }
        tr:hover { background-color: #f1f1f1; }
        
        .btn-view {
            background-color: #17a2b8; color: white; padding: 6px 12px;
            text-decoration: none; border-radius: 4px; font-size: 12px; margin-right: 5px;
        }
        .btn-approve {
            background-color: #28a745; color: white; padding: 8px 15px;
            border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .btn-approve:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .loader {
            text-align: center; padding: 50px; font-size: 18px; color: #555;
        }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #007bff;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .no-data { text-align: center; padding: 50px; font-size: 18px; color: #888; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Pending Withdrawal Requests</h2>
        <button onclick="fetchPendingRequests()" style="padding:10px; cursor:pointer;">Refresh Data</button>
    </div>

    <div id="loader" class="loader">
        <div class="spinner"></div>
        Loading requests...
    </div>

    <div id="noDataMessage" class="no-data">
        🎉 No pending requests right now!
    </div>

    <table id="requestsTable" style="display: none;">
        <thead>
            <tr>
                <th>Date</th>
                <th>User ID</th>
                <th>Full Name</th>
                <th>Profession</th>
                <th>Network</th>
                <th>UPI ID</th>
                <th>Documents</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- Data will be injected here -->
        </tbody>
    </table>

    <script>
        // अपना Google Web App URL यहाँ डालें
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz_leCWfb7HNhh4BLGLMqhM8dF9jCKpvmqIZkijnzEJl__E3dZftwl3z-hZ7mmzYtrHSA/exec';

        window.onload = fetchPendingRequests;

        async function fetchPendingRequests() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('requestsTable').style.display = 'none';
            document.getElementById('noDataMessage').style.display = 'none';
            document.getElementById('tableBody').innerHTML = "";

            try {
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "getPendingWithdrawals" })
                });
                const result = await response.json();

                document.getElementById('loader').style.display = 'none';

                if (result.status === 'success' && result.data.length > 0) {
                    document.getElementById('requestsTable').style.display = 'table';
                    populateTable(result.data);
                } else {
                    document.getElementById('noDataMessage').style.display = 'block';
                }
            } catch (error) {
                console.error(error);
                alert("Failed to fetch data.");
                document.getElementById('loader').style.display = 'none';
            }
        }

        function populateTable(data) {
            const tbody = document.getElementById('tableBody');
            data.forEach(req => {
                // Formatting Date
                let dateObj = new Date(req.timestamp);
                let formattedDate = dateObj.toLocaleDateString() + " " + dateObj.toLocaleTimeString();

                let tr = document.createElement('tr');
                tr.id = `row-${req.row}`;
                
                tr.innerHTML = `
                    <td>${formattedDate}</td>
                    <td><b>${req.userId}</b></td>
                    <td>${req.fullName}</td>
                    <td>${req.profession}</td>
                    <td>${req.networkCapacity}</td>
                    <td>${req.upiId}</td>
                    <td>
                        <a href="${req.userImage}" target="_blank" class="btn-view">Photo</a>
                        <a href="${req.profDoc}" target="_blank" class="btn-view">Doc</a>
                        <a href="${req.qrCode}" target="_blank" class="btn-view">QR</a>
                    </td>
                    <td>
                        <button class="btn-approve" id="btn-${req.row}" onclick="approveRequest(${req.row}, '${req.userId}', '${req.fullName}')">
                            Approve
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function approveRequest(rowNum, userId, fullName) {
            if(!confirm(`Are you sure you want to approve ${fullName}?`)) return;

            const btn = document.getElementById(`btn-${rowNum}`);
            btn.innerText = "Approving...";
            btn.disabled = true;

            try {
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: "approveWithdrawal", 
                        row: rowNum, 
                        userId: userId, 
                        fullName: fullName 
                    })
                });
                const result = await response.json();

                if (result.status === 'success') {
                    alert(`${fullName} Approved Successfully!`);
                    // Row को टेबल से गायब कर दें
                    document.getElementById(`row-${rowNum}`).remove();
                    
                    // अगर टेबल खाली हो गई हो तो No Data मैसेज दिखाएं
                    if(document.getElementById('tableBody').children.length === 0) {
                        document.getElementById('requestsTable').style.display = 'none';
                        document.getElementById('noDataMessage').style.display = 'block';
                    }
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error(error);
                alert("Approval Failed: " + error.message);
                btn.innerText = "Approve";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
