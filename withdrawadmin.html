<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Withdrawal Approvals | Bhavya Care</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0; padding: 20px;
        }
        .header {
            background: #fff; padding: 20px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;
        }
        h2 { margin: 0; color: #333; }
        table {
            width: 100%; border-collapse: collapse; background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden;
        }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; font-size: 14px;}
        th { background-color: #007bff; color: white; }
        tr:hover { background-color: #f1f1f1; }
        
        .btn-view {
            background-color: #17a2b8; color: white; padding: 6px 12px;
            text-decoration: none; border-radius: 4px; font-size: 12px; margin-right: 5px;
            display: inline-block; margin-bottom: 5px;
        }
        .btn-view:hover { background-color: #138496; }

        .btn-approve {
            background-color: #28a745; color: white; padding: 8px 15px;
            border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .btn-approve:hover { background-color: #218838; }
        .btn-approve:disabled { background-color: #ccc; cursor: not-allowed; }
        
        .refresh-btn {
            padding: 10px 20px; cursor: pointer; background: #007bff; color: white; 
            border: none; border-radius: 5px; font-weight: bold; font-size: 14px;
        }
        .refresh-btn:hover { background: #0056b3; }

        .loader {
            text-align: center; padding: 50px; font-size: 18px; color: #555;
        }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #007bff;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .no-data { text-align: center; padding: 50px; font-size: 18px; color: #888; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Withdrawal Requests Dashboard</h2>
        <button class="refresh-btn" onclick="fetchPendingRequests()">Refresh Data</button>
    </div>

    <div id="loader" class="loader">
        <div class="spinner"></div>
        Loading requests...
    </div>

    <div id="noDataMessage" class="no-data">
        🎉 No requests found right now!
    </div>

    <table id="requestsTable" style="display: none;">
        <thead>
            <tr>
                <th>Date</th>
                <th>User ID</th>
                <th>Full Name</th>
                <th>Profession</th>
                <th>Network</th>
                <th>UPI ID</th>
                <th>Documents</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <script>
        // TODO: अपना Google Apps Script का Web App URL यहाँ डालें ⬇️
        const scriptURL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL';

        // पेज लोड होते ही डेटा मंगाना शुरू करें
        window.onload = fetchPendingRequests;

        async function fetchPendingRequests() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('requestsTable').style.display = 'none';
            document.getElementById('noDataMessage').style.display = 'none';
            document.getElementById('tableBody').innerHTML = "";

            try {
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "getAllWithdrawalRequests" }) 
                });
                const result = await response.json();

                document.getElementById('loader').style.display = 'none';

                if (result.status === 'success' && result.data.length > 0) {
                    document.getElementById('requestsTable').style.display = 'table';
                    populateTable(result.data);
                } else {
                    document.getElementById('noDataMessage').style.display = 'block';
                }
            } catch (error) {
                console.error(error);
                alert("Failed to fetch data. Check your internet connection or script URL.");
                document.getElementById('loader').style.display = 'none';
            }
        }

        function populateTable(data) {
            const tbody = document.getElementById('tableBody');
            data.forEach(req => {
                // Date Formatting
                let dateObj = new Date(req.timestamp);
                let formattedDate = dateObj.toLocaleDateString() + "<br><small style='color:gray;'>" + dateObj.toLocaleTimeString() + "</small>";

                let tr = document.createElement('tr');
                tr.id = `row-${req.row}`;
                
                // Status के हिसाब से बैज (Badge) और बटन का रंग बदलना
                let statusBadge = req.status === "Approved" 
                                  ? `<span style="color: #28a745; font-weight: bold;">Approved ✅</span>` 
                                  : `<span style="color: #fd7e14; font-weight: bold;">Pending ⏳</span>`;
                
                // अगर अप्रूव हो चुका है, तो बटन को 'Done' और Disabled कर दें
                let actionBtn = req.status === "Approved"
                                  ? `<button class="btn-approve" style="background: #ccc; cursor: not-allowed;" disabled>Done</button>`
                                  : `<button class="btn-approve" id="btn-${req.row}" onclick="approveRequest(${req.row}, '${req.userId}', '${req.fullName}')">Approve</button>`;

                tr.innerHTML = `
                    <td>${formattedDate}</td>
                    <td><b>${req.userId}</b></td>
                    <td>${req.fullName}</td>
                    <td>${req.profession}</td>
                    <td><b>${req.networkCapacity}</b></td>
                    <td>${req.upiId}</td>
                    <td>
                        <a href="${req.userImage}" target="_blank" class="btn-view">Photo</a>
                        <a href="${req.profDoc}" target="_blank" class="btn-view">Doc</a>
                        <a href="${req.qrCode}" target="_blank" class="btn-view">QR</a>
                    </td>
                    <td>${statusBadge}</td>
                    <td>${actionBtn}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function approveRequest(rowNum, userId, fullName) {
            if(!confirm(`Are you sure you want to approve the withdrawal request for ${fullName} (${userId})?`)) return;

            const btn = document.getElementById(`btn-${rowNum}`);
            btn.innerText = "Approving...";
            btn.disabled = true;

            try {
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "approveWithdrawal", row: rowNum, userId: userId, fullName: fullName })
                });
                const result = await response.json();

                if (result.status === 'success') {
                    alert(`${fullName} has been Approved Successfully!`);
                    // पेज को रीफ्रेश कर दें ताकि लिस्ट में 'Approved' स्टेटस अपडेट हो जाए
                    fetchPendingRequests(); 
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error(error);
                alert("Approval Failed: " + error.message);
                btn.innerText = "Approve";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
